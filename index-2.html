<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clean-ui curator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/fflate@0.8.2/umd/index.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    /*
     * Editorial palette — derived from the `stripe-pricing-page-2025` entry.
     *
     * The decisive move (per its critique): serif on display numbers/heads,
     * plain sans for everything else. "The serif/sans pairing is doing almost
     * all the brand-differentiation work here." So --serif lands on hero
     * numbers + titles only; body stays Inter.
     *
     * Ink is navy (#0a2540) — taken straight from the entry's dominantColors,
     * deliberately not black. Accent is Stripe indigo #635bff, reserved for
     * state (focus, primary action). No third brand color.
     *
     * Depth comes from whitespace + a single cool inset, NOT from box-shadow
     * (the entry's antiPattern: "depth comes from whitespace and a single
     * serif/sans type contrast"). Selection is signalled by a 2px border-color
     * change, never by a filled tint or badge (the entry's other antiPattern:
     * "Avoids the 'Most Popular' ribbon/badge cliché").
     *
     * --faint is held at ≥4.5:1 on white — the Linear a11y caveat from
     * `linear-issue-board-grouped` ("borderline accessibility issue if copied
     * literally") stays fixed.
     */
    --canvas:      #ffffff;   /* app background — pure white, editorial confidence */
    --surface:     #ffffff;   /* cards share the canvas; separation is hairline + space */
    --inset:       #f6f9fc;   /* one cool inset (Stripe) for inputs, wells, code */
    --hover:       #f3f6fa;   /* hover ground, barely visible */
    --ink:         #0a2540;   /* primary text — navy, from entry dominantColors */
    --muted:       #425466;   /* secondary text — ≥7:1 on white */
    --faint:       #687385;   /* metadata — ≥4.5:1 on white (Linear a11y fix) */
    --line:        #e6e8ec;   /* hairline — structure, not decoration (Linear) */
    --rule:        #0a2540;   /* navy hairline for the few dividers doing real work */
    /* Stripe indigo — state only: focus ring, primary action, active border. */
    --accent:      #635bff;
    --accent-2:    #4f46e5;   /* hover — pressed indigo */
    --accent-ring: rgba(99,91,255,.18);
    /* Semantic, used sparingly. */
    --green:       #0e8a5f;
    --red:         #d23b3b;
    --amber:       #9a6a00;
    --serif: "Newsreader", Georgia, "Times New Roman", serif;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --r-sm: 6px;
    --r:    8px;
    --r-lg: 12px;
  }

  html, body { height: 100%; margin: 0; background: var(--canvas); color: var(--ink); font-family: var(--sans); font-size: 14px; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body { overflow: hidden; }
  button, input, textarea, select { font: inherit; color: inherit; }
  button { cursor: pointer; background: none; border: 0; }
  ::selection { background: var(--accent-ring); }
  code { font-family: var(--mono); font-size: .9em; background: var(--inset); padding: 1px 5px; border-radius: 4px; }

  /* ── App shell ─────────────────────────────────────────────── */
  #app { height: 100vh; display: grid; grid-template-rows: 56px 1fr; }

  .topbar {
    display: flex; align-items: center; gap: 18px; padding: 0 22px;
    background: var(--canvas); border-bottom: 1px solid var(--line);
  }
  /* Wordmark becomes the personality beat: serif italic, one place.
     Sublabel stays mono. The indigo brand-mark square is gone — no decoration. */
  .brand { display: flex; flex-direction: column; justify-content: center; min-width: 210px; line-height: 1.05; }
  .brand-name { font: italic 500 21px/1 var(--serif); font-optical-sizing: auto; letter-spacing: -0.01em; color: var(--ink); }
  .brand small { display: block; color: var(--faint); font: 500 10px/1 var(--mono); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.08em; }

  /* Search becomes a plain underlined field — editorial, not pill-on-gray. */
  .search { position: relative; flex: 1; max-width: 560px; }
  .search svg { position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--faint); }
  .search input {
    width: 100%; height: 34px; border: 0; border-bottom: 1px solid var(--line); border-radius: 0;
    padding: 0 12px 0 26px; color: var(--ink); background: transparent;
    outline: none; transition: border-color .15s;
  }
  .search input::placeholder { color: var(--faint); }
  .search input:focus { border-bottom-color: var(--ink); }

  .top-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

  /* ── Buttons ───────────────────────────────────────────────── */
  .btn {
    height: 34px; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 0 14px; border: 1px solid var(--line); border-radius: var(--r-sm);
    background: var(--canvas); color: var(--ink); font-weight: 500; font-size: 13px; white-space: nowrap;
    transition: border-color .15s, color .15s;
  }
  .btn svg { width: 15px; height: 15px; }
  .btn:hover { border-color: var(--ink); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn.danger { color: var(--red); border-color: #ead7d7; }
  .btn.danger:hover { border-color: var(--red); }
  .btn.icon { width: 34px; padding: 0; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--line); }

  /* ── Layout shell ──────────────────────────────────────────── */
  /*
   * Three-zone shell — the Origin dashboards' "three-column" form with
   * regions [primary-nav, main-canvas, detail-rail]. Left nav + main canvas
   * + right detail rail. Separation is hairline + whitespace, never shadow.
   */
  .shell { min-height: 0; display: grid; grid-template-columns: 280px minmax(0, 1fr); }
  aside { min-height: 0; border-right: 1px solid var(--line); background: var(--canvas); display: grid; grid-template-rows: 1fr auto; }

  /* Sidebar entry list — the sidebar's whole job now. */
  .entry-list { min-height: 0; overflow: auto; padding: 10px; }
  .entry-row {
    width: 100%; text-align: left; border: 1px solid transparent; border-left: 2px solid transparent; border-radius: var(--r-sm);
    background: transparent; padding: 10px 12px; display: grid; gap: 4px; transition: border-color .12s, background .12s;
  }
  .entry-row:hover { background: var(--hover); }
  .entry-row.active { background: transparent; border-left-color: var(--rule); }
  .entry-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .product { font: 500 12px/1.2 var(--sans); color: var(--ink); }
  .quality { display: flex; gap: 2px; }
  .quality i { width: 5px; height: 5px; border-radius: 50%; background: var(--line); display: block; }
  .quality i.on { background: var(--rule); }
  .entry-title { color: var(--muted); font-weight: 400; font-size: 12px; line-height: 1.35; overflow-wrap: anywhere; }
  .entry-meta { display: flex; gap: 4px; flex-wrap: wrap; }
  .mini-tag { color: var(--faint); font: 500 10px/1.2 var(--mono); }
  .mini-tag::before { content: "#"; opacity: .5; }
  .list-footer { padding: 12px 16px; color: var(--faint); border-top: 1px solid var(--line); font: 500 11px/1.2 var(--sans); }

  /* Main workspace */
  main { min-width: 0; min-height: 0; overflow: auto; }
  .workspace { min-height: 100%; display: grid; grid-template-rows: auto 1fr; }
  .tabs { height: 46px; display: flex; align-items: center; gap: 4px; padding: 0 22px; border-bottom: 1px solid var(--line); background: var(--canvas); position: sticky; top: 0; z-index: 5; }
  .tab {
    height: 46px; border: 0; border-bottom: 2px solid transparent; background: transparent;
    padding: 0 14px; color: var(--faint); font-weight: 500; font-size: 13px; transition: color .12s, border-color .12s;
  }
  .tab:hover { color: var(--muted); }
  /* Active tab = 2px navy underline. No indigo, no fill. */
  .tab.active { color: var(--ink); border-bottom-color: var(--rule); }

  /* Spacious padding — entry: "generous whitespace reads as confidence." */
  .page { padding: 28px 32px 40px; }

  /* ── Grids / panels ────────────────────────────────────────── */
  .detail-layout, .library-grid, .form-layout { display: grid; gap: 20px; align-items: start; }

  /* The main canvas: 1px hairline, no shadow. Depth = whitespace + type. */
  .canvas-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
    overflow: hidden;
  }
  .canvas-card > .card-head {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 18px 24px; border-bottom: 1px solid var(--line);
  }
  .canvas-card > .card-body { padding: 24px; display: grid; gap: 20px; }

  /* Attribute block — was the right rail; now a bordered section inside the main card. */
  .attr-block { background: var(--inset); border: 1px solid var(--line); border-radius: var(--r); padding: 18px; }
  .attr-block + .attr-block { margin-top: 14px; }
  .attr-block .section-title { margin-bottom: 12px; }
  /* In-page save-check (Form view) — sits below the form, always visible now. */
  .in-page-rail { margin-top: 20px; }
  .in-page-rail .rail-card { background: var(--inset); border: 1px solid var(--line); border-radius: var(--r); padding: 18px; }
  .in-page-rail .rail-card .section-title { margin-bottom: 12px; }

  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); }
  .panel-head { min-height: 54px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line); }
  .panel-title { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
  .panel-sub { color: var(--faint); font: 500 11px/1.3 var(--sans); margin-top: 3px; }
  .panel-body { padding: 18px; }

  /* ── Detail view ───────────────────────────────────────────── */
  .detail-hero { display: grid; gap: 16px; }
  /* The Library hero title — serif, the editorial centerpiece. */
  .sample-title { margin: 0; font-family: var(--serif); font-weight: 500; font-size: 34px; line-height: 1.15; letter-spacing: -0.02em; font-optical-sizing: auto; overflow-wrap: anywhere; color: var(--ink); }
  .source-line { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; color: var(--faint); font: 500 12px/1.2 var(--sans); }
  .source-line a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line); }
  .source-line a:hover { border-bottom-color: var(--ink); }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
  /* Tags become outlined navy hairline chips — quiet, not filled-tint blocks. */
  .tag { border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px; font: 500 11px/1.4 var(--sans); color: var(--muted); background: transparent; }
  .tag.style { color: var(--muted); }

  .image-stage {
    min-height: 320px; aspect-ratio: 16 / 10; border: 1px solid var(--line); border-radius: var(--r);
    background: var(--inset); display: grid; place-items: center; overflow: hidden; position: relative;
  }
  .image-stage img { width: 100%; height: 100%; object-fit: contain; display: block; background: var(--surface); }
  .image-empty { text-align: center; color: var(--faint); display: grid; gap: 8px; justify-items: center; }
  .image-empty svg { width: 30px; height: 30px; }
  .badge {
    display: inline-flex; align-items: center; height: 22px; border-radius: 999px; padding: 0 10px;
    font: 500 10px/1 var(--mono); color: var(--muted); background: var(--canvas); border: 1px solid var(--line);
  }
  .image-badge { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,.94); backdrop-filter: blur(6px); }

  .copy-block { display: grid; gap: 24px; margin-top: 4px; }
  /* Eyebrows stay uppercase tracked — but in --muted (≥7:1), not --faint. */
  .section-title {
    margin: 0 0 10px; color: var(--muted); font: 600 10px/1 var(--sans);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  /* Critique prose reads editorially — larger, more leading. */
  .critique { margin: 0; font-size: 16px; line-height: 1.7; color: var(--ink); }
  .steal-list, .avoid-list { margin: 0; padding: 0; list-style: none; display: grid; gap: 10px; }
  .steal-list li, .avoid-list li { display: grid; grid-template-columns: 14px 1fr; gap: 10px; line-height: 1.6; font-size: 14px; color: var(--ink); }
  .steal-list li::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--green); margin-top: 8px; }
  .avoid-list li::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--amber); margin-top: 8px; }

  /* ── Entry cards (all-entries sidebar list) ────────────────── */
  .all-entries { display: grid; gap: 6px; }
  .entry-card {
    width: 100%; text-align: left; border: 1px solid transparent; border-radius: var(--r-sm);
    background: transparent; padding: 10px 12px; display: grid; gap: 4px; transition: border-color .12s, background .12s;
  }
  .entry-card:hover { background: var(--hover); }
  .entry-card.active { background: transparent; border-color: var(--rule); }

  /* ── Attribute grid ────────────────────────────────────────── */
  .attr-grid { display: grid; gap: 16px; }
  .swatches { display: flex; flex-wrap: wrap; gap: 6px; }
  .swatch { width: 30px; height: 30px; border-radius: var(--r-sm); border: 1px solid rgba(10,37,64,.12); position: relative; }
  .swatch.accent { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* Color roles — labeled token strip. */
  .color-tokens { display: grid; gap: 6px; }
  .color-token { display: grid; grid-template-columns: 22px 1fr auto; gap: 8px; align-items: center; }
  .color-chip { width: 22px; height: 22px; border-radius: 5px; border: 1px solid rgba(10,37,64,.12); }
  .color-role { font: 500 12px/1 var(--sans); color: var(--muted); text-transform: capitalize; }
  .color-hex { font: 500 11px/1 var(--mono); color: var(--faint); }

  /* Voice block. */
  .voice-tone { font-weight: 550; font-size: 13px; margin-bottom: 8px; }
  .voice-examples { margin: 0; padding: 0; list-style: none; display: grid; gap: 6px; }
  .voice-examples li { font-size: 13px; line-height: 1.5; color: var(--ink); padding-left: 14px; position: relative; }
  .voice-examples li::before { content: "\201C"; position: absolute; left: 0; color: var(--faint); }
  .voice-avoid { margin-top: 8px; font-size: 12px; color: var(--amber); line-height: 1.4; }
  .kv { display: grid; grid-template-columns: 120px 1fr; gap: 8px; padding: 9px 0; border-bottom: 1px solid var(--line); align-items: baseline; }
  .kv:last-child { border-bottom: 0; }
  .kv dt { color: var(--faint); font: 500 12px/1.3 var(--sans); }
  /* Coverage counts — the stats-page hero numbers, set in serif. */
  .kv dd { margin: 0; font-family: var(--serif); font-weight: 500; font-size: 18px; line-height: 1; color: var(--ink); font-optical-sizing: auto; }

  /* ── Layout wireframe ──────────────────────────────────────── */
  .wireframe { margin-top: 4px; }
  .wire-block {
    border: 1px solid var(--line); border-radius: 4px; background: var(--inset);
    min-height: 34px; display: grid; place-items: center; padding: 4px;
    color: var(--muted); font: 500 9px/1.1 var(--mono); text-align: center; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .wire-block[data-role="primary-nav"], .wire-block[data-role="icon-nav"] { background: var(--hover); }
  .wire-block[data-role="main-canvas"] { min-height: 60px; background: var(--surface); border-color: var(--rule); }
  .wire-block[data-role="summary-strip"] { min-height: 22px; }
  .wire-block[data-role="overlay-card"] { min-height: 60px; }

  /* ── Form ──────────────────────────────────────────────────── */
  form { display: grid; gap: 22px; }
  fieldset { border: 0; padding: 0; margin: 0; display: grid; gap: 12px; }
  legend { padding: 0; font: 600 10px/1 var(--sans); color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  label { display: grid; gap: 6px; color: var(--muted); font: 500 12px/1.3 var(--sans); }
  /* Form fields: underlined, editorial. No filled boxes. */
  input, textarea, select {
    width: 100%; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--canvas);
    color: var(--ink); padding: 9px 11px; outline: none; font-size: 13px; transition: border-color .15s, box-shadow .15s;
  }
  input::placeholder, textarea::placeholder { color: var(--faint); }
  input:focus, textarea:focus, select:focus { border-color: var(--ink); box-shadow: 0 1px 0 var(--ink); }
  textarea { min-height: 92px; resize: vertical; line-height: 1.55; }
  input[type="color"] { height: 38px; padding: 3px; }

  .check-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .check-chip input { position: absolute; opacity: 0; pointer-events: none; }
  .check-chip span {
    display: inline-flex; align-items: center; min-height: 28px; border: 1px solid var(--line);
    border-radius: 999px; padding: 0 12px; background: transparent; color: var(--muted);
    font: 500 11px/1 var(--sans); transition: border-color .12s, color .12s;
  }
  .check-chip:hover span { border-color: var(--faint); color: var(--ink); }
  /* Checked = 2px navy border, no fill. */
  .check-chip input:checked + span { border: 2px solid var(--rule); color: var(--ink); padding: 0 11px; }

  .dropzone {
    min-height: 140px; border: 1px dashed var(--line); border-radius: var(--r); background: var(--inset);
    display: grid; place-items: center; text-align: center; padding: 18px; color: var(--muted); transition: border-color .15s;
  }
  .dropzone.drag { border-color: var(--ink); }
  .dropzone input { display: none; }
  .dropzone strong { display: block; color: var(--ink); margin-bottom: 4px; font-weight: 600; }

  .source-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .source-action {
    min-height: 80px; border: 1px solid var(--line); border-radius: var(--r); background: var(--canvas);
    display: grid; align-content: center; justify-items: center; gap: 6px; color: var(--muted);
    font-weight: 500; font-size: 12px; transition: border-color .15s, color .15s;
  }
  .source-action svg { width: 18px; height: 18px; color: var(--ink); }
  .source-action:hover { border-color: var(--ink); color: var(--ink); }

  .image-preview { border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; background: var(--inset); }
  .image-preview img { width: 100%; max-height: 280px; object-fit: contain; display: block; background: var(--surface); }
  .image-preview figcaption { padding: 10px 14px; color: var(--muted); font: 500 11px/1.3 var(--sans); border-top: 1px solid var(--line); }
  .image-ready { color: var(--green); }

  /* ── Callouts ──────────────────────────────────────────────── */
  .legacy-note { border: 1px solid #ead9b0; background: #fdf6e8; color: var(--amber); border-radius: var(--r-sm); padding: 11px 14px; font-weight: 500; font-size: 13px; line-height: 1.5; }
  .key-status { border: 1px solid var(--line); border-radius: var(--r-sm); padding: 11px 14px; background: var(--canvas); color: var(--muted); font-weight: 500; font-size: 13px; line-height: 1.5; }
  .key-status.ready { border-color: #c3ddd0; color: var(--green); }
  .key-status.missing { border-color: #ead9b0; color: var(--amber); }
  .starter { border: 1px solid var(--line); background: var(--inset); border-radius: var(--r-sm); padding: 14px 16px; display: grid; gap: 6px; color: var(--muted); font-size: 13px; line-height: 1.55; }
  .starter strong { color: var(--ink); font-weight: 600; }
  .starter p { margin: 0; }
  .starter em { font-style: italic; font-family: var(--serif); color: var(--ink); font-weight: 500; }

  /* ── Disclosure (advanced) ─────────────────────────────────── */
  .advanced { border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--canvas); overflow: hidden; }
  .advanced summary {
    min-height: 42px; display: flex; align-items: center; padding: 0 14px;
    font: 500 13px/1 var(--sans); color: var(--muted); cursor: pointer; list-style: none;
  }
  .advanced summary::-webkit-details-marker { display: none; }
  .advanced summary::before { content: "▸"; margin-right: 8px; color: var(--faint); transition: transform .15s; }
  .advanced[open] summary::before { transform: rotate(90deg); }
  .advanced summary:hover { color: var(--ink); }
  .advanced-body { padding: 0 14px 14px; display: grid; gap: 12px; }

  /* ── Validation / JSON preview ─────────────────────────────── */
  .json-tools { display: grid; gap: 10px; }
  .validation { display: grid; gap: 6px; }
  .issue { display: grid; grid-template-columns: 16px 1fr; gap: 8px; color: var(--red); font: 500 13px/1.45 var(--sans); }
  .issue svg { width: 15px; height: 15px; margin-top: 1px; }
  .issue.ok { color: var(--green); }
  .preview-json {
    margin: 0; overflow: auto; max-height: 340px; background: #0d1b2a; color: #c5d0de;
    border-radius: var(--r-sm); padding: 14px; font: 500 11px/1.6 var(--mono);
  }

  /* ── Empty + toast ─────────────────────────────────────────── */
  .empty-state { min-height: calc(100vh - 110px); display: grid; place-items: center; color: var(--faint); text-align: center; }
  .empty-state svg { width: 36px; height: 36px; margin-bottom: 12px; }
  .empty-state p { margin: 0 0 14px; font-size: 14px; }

  .toast {
    position: fixed; right: 20px; bottom: 20px; z-index: 20; padding: 11px 16px; border-radius: var(--r-sm);
    border: 1px solid var(--line); background: var(--canvas); box-shadow: 0 8px 24px rgba(10,37,64,.10);
    font-weight: 500; font-size: 13px; transform: translateY(8px); opacity: 0; pointer-events: none; transition: .18s ease;
  }
  /* Shadow on a transient overlay is fine — the entry bans shadow for *card depth*, not toasts. */
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { color: var(--green); border-color: #c3ddd0; }
  .toast.error { color: var(--red); border-color: #ead7d7; }

  /* ── Bulk import ───────────────────────────────────────────── */
  .bulk-empty { padding: 40px 20px; text-align: center; color: var(--faint); }
  .bulk-empty svg { width: 36px; height: 36px; margin-bottom: 10px; }
  .bulk-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .bulk-bar label.bulk-add { display: inline-flex; align-items: center; gap: 6px; }
  .bulk-default-product { flex: 1; min-width: 180px; }
  .bulk-queue { display: flex; flex-direction: column; gap: 0; margin-top: 18px; border-top: 1px solid var(--line); }
  /* Bulk rows: hairline rows, not rounded cards — reads as a list. */
  .bulk-row {
    display: grid; grid-template-columns: 52px 1fr auto; gap: 14px; align-items: center;
    background: transparent; border: 0; border-bottom: 1px solid var(--line); padding: 14px 4px; transition: background .12s;
  }
  .bulk-row:hover { background: var(--hover); }
  .bulk-row.committing { opacity: .65; }
  .bulk-row.error { background: #fdf2f2; }
  .bulk-row .thumb {
    width: 52px; height: 38px; object-fit: cover; border-radius: 4px; background: var(--inset); border: 1px solid var(--line);
  }
  .bulk-row .thumb.empty { display: grid; place-items: center; color: var(--faint); }
  .bulk-row .thumb.empty svg { width: 16px; height: 16px; }
  .bulk-row .meta { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .bulk-row .meta .filename { font: 500 11px/1.2 var(--mono); color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bulk-row .meta .product-input {
    border: 1px solid var(--line); border-radius: 5px; padding: 4px 8px; height: 28px; width: 100%;
    max-width: 300px; background: var(--canvas); font-size: 12px;
  }
  .bulk-row .meta .err { color: var(--red); font-size: 11px; }
  .bulk-row .actions { display: flex; gap: 6px; align-items: center; }
  .bulk-row .remove { width: 28px; height: 28px; padding: 0; color: var(--faint); border: 1px solid transparent; }
  .bulk-row .remove:hover { color: var(--red); border-color: var(--line); }
  /* Status chips: outlined, not filled. */
  .status-chip {
    border: 1px solid var(--line); border-radius: 999px; padding: 2px 9px; font: 500 10px/1.5 var(--sans); white-space: nowrap; color: var(--muted); background: transparent;
  }
  .status-chip.staged { color: var(--amber); border-color: #ead9b0; }
  .status-chip.extraction { color: var(--accent); border-color: #c8c4f5; }
  .status-chip.tagging { color: var(--accent); border-color: #c8c4f5; }
  .status-chip.tagged { color: var(--green); border-color: #c3ddd0; }
  .status-chip.error { color: var(--red); border-color: #ead7d7; }
  .status-chip.committed { color: var(--faint); }
  .status-chip.committing { color: var(--accent); border-color: #c8c4f5; }
  .queue-tally { display: flex; gap: 20px; flex-wrap: wrap; }
  .queue-tally .t { font: 500 12px/1.3 var(--sans); color: var(--faint); }
  .queue-tally .t b { font-family: var(--serif); font-weight: 500; font-size: 17px; color: var(--ink); }
  .cleanup-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .cleanup-row:last-child { border-bottom: 0; }
  .small-copy { color: var(--muted); line-height: 1.5; margin: 0; font-size: 13px; }

  /* ── Responsive ────────────────────────────────────────────── */
  @media (max-width: 1180px) {
    /* Two-column shell already collapses gracefully; just widen sidebar slightly. */
    .shell { grid-template-columns: 260px minmax(0, 1fr); }
  }
  @media (max-width: 760px) {
    body { overflow: auto; }
    #app { height: auto; min-height: 100vh; }
    .topbar { flex-wrap: wrap; height: auto; padding: 12px; gap: 10px; }
    .brand { min-width: 0; }
    .search { order: 3; flex-basis: 100%; max-width: none; }
    .shell { display: block; }
    aside { display: none; }
    main { overflow: visible; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .sample-title { font-size: 26px; }
    .page { padding: 18px; }
    .stat b { font-size: 20px; }
    .panel-head { align-items: flex-start; flex-direction: column; }
    .image-stage { min-height: 220px; aspect-ratio: auto; width: 100%; }
    .source-line { align-items: flex-start; }
  }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-name">clean-ui</span>
      <small>corpus workbench</small>
    </div>
    <div class="search">
      <i data-lucide="search"></i>
      <input id="searchInput" type="search" placeholder="Search…  try: cat:dashboard  style:minimal  pricing">
    </div>
    <div class="top-actions">
      <button class="btn" id="refreshBtn"><i data-lucide="refresh-cw"></i>Refresh</button>
      <button class="btn primary" id="newBtn"><i data-lucide="plus"></i>New sample</button>
    </div>
  </header>

  <div class="shell">
    <aside>
      <!-- Sidebar is the entry list, full stop. No stat strip, no chip decks —
           filtering lives in the search bar via cat:/style: prefixes. -->
      <div class="entry-list" id="entryList"></div>
      <div class="list-footer" id="listFooter">0 entries</div>
    </aside>

    <main>
      <div class="workspace">
        <nav class="tabs">
          <button class="tab active" data-view="detail">Library</button>
          <button class="tab" data-view="form">New sample</button>
          <button class="tab" data-view="bulk">Bulk import</button>
          <button class="tab" data-view="stats">Coverage</button>
        </nav>
        <div id="page" class="page"></div>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if (window.location.protocol === "file:") {
  window.location.replace("http://localhost:3131/");
}

const API = "/api";
const today = () => new Date().toISOString().slice(0, 10);
const state = {
  entries: [],
  schema: { categories: [], styleTags: [], patternTypes: [], spacingDensities: [], cornerStyles: [], imageVisibilities: [] },
  selectedId: null,
  view: "detail",
  query: "",
	  filters: { categories: new Set(), styleTags: new Set() },
	  draft: null,
	  draftMode: "create",
	  uploadedImage: null,
	  bulkQueue: [],
	  bulkDefaultProduct: "",
	  bulkBatchId: null,
	  bulkEditingIndex: null,
	  orphans: [],
	  config: { openaiKeyConfigured: false, anthropicKeyConfigured: false, geminiKeyConfigured: false, visionKeyConfigured: false, autoTagProvider: "openai", extractionProvider: "openai", critiqueProvider: "openai", extractionModel: "", critiqueModel: "", envFileLoaded: false, openaiAutoTagModel: "gpt-5.4-nano" },
	};

const $ = (selector) => document.querySelector(selector);
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
  "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
})[char]);
const slugify = (value) => value.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").replace(/-{2,}/g, "-") || "sample";
const lines = (value) => String(value || "").split("\n").map((line) => line.trim()).filter(Boolean);

// Derive the active provider display name + model from config (mirrors tagger.resolveProvider).
const providerName = () => {
  const p = state.config.autoTagProvider || "openai";
  const has = { openai: state.config.openaiKeyConfigured, claude: state.config.anthropicKeyConfigured, gemini: state.config.geminiKeyConfigured };
  let active = p;
  if (!has[p]) { for (const k of ["openai","claude","gemini"]) { if (has[k]) { active = k; break; } } }
  return { openai: "OpenAI", claude: "Claude", gemini: "Gemini" }[active] || "OpenAI";
};

async function request(path, options = {}) {
  const response = await fetch(`${API}${path}`, {
    headers: { "content-type": "application/json", ...(options.headers || {}) },
    ...options,
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) {
    const message = data.issues?.join("\n") || data.error || "Request failed";
    throw new Error(message);
  }
  return data;
}

function qualityDots(score) {
  return `<span class="quality">${[1,2,3,4,5].map((n) => `<i class="${n <= score ? "on" : ""}"></i>`).join("")}</span>`;
}

function renderIcons() {
  if (window.lucide) window.lucide.createIcons();
}

async function loadAll({ keepSelection = true } = {}) {
	  const [schema, entries, stats, orphanData, config] = await Promise.all([
	    request("/schema"),
	    request("/entries"),
	    request("/stats"),
	    request("/orphans"),
	    request("/config"),
	  ]);
	  state.schema = schema;
	  state.entries = entries.entries;
	  state.orphans = orphanData.orphans || [];
	  state.config = config;
  if (!keepSelection || !state.entries.some((entry) => entry.id === state.selectedId)) {
    state.selectedId = state.entries[0]?.id ?? null;
  }
  renderList();
  renderPage();
}

// Filtering moved into the search bar. Tokens prefixed `cat:` or `style:`
// filter by category / style tag; everything else is a free-text term over
// the entry's searchable fields. Replaces the 32 always-visible chip buttons.
function parseQuery(raw) {
  const tokens = raw.toLowerCase().split(/\s+/).filter(Boolean);
  const cats = new Set(), styles = new Set(), terms = [];
  for (const tok of tokens) {
    const cat = tok.match(/^cat:(.+)$/), st = tok.match(/^style:(.+)$/);
    if (cat) cats.add(cat[1]);
    else if (st) styles.add(st[1]);
    else terms.push(tok);
  }
  return { cats, styles, terms };
}

function filteredEntries() {
  const { cats, styles, terms } = parseQuery(state.query || "");
  return state.entries.filter((entry) => {
    if (cats.size && ![entry.patternType, ...entry.categories].some((c) => cats.has(c))) return false;
    if (styles.size && !entry.styleTags.some((s) => styles.has(s))) return false;
    if (!terms.length) return true;
    const haystack = [
      entry.id, entry.title, entry.source.productName, entry.source.url, entry.critique,
      ...entry.whatToSteal, ...(entry.antiPatterns?.antiPatterns || []), ...(entry.antiPatterns?.whereThisFails || []), entry.patternType, ...entry.categories, ...entry.styleTags,
      ...entry.visual.dominantColors, entry.visual.accentColor, entry.visual.spacingDensity,
      entry.visual.cornerStyle, entry.visual.typePairing.display, entry.visual.typePairing.body,
      entry.visual.typePairing.notes,
    ].filter(Boolean).join(" ").toLowerCase();
    return terms.every((term) => haystack.includes(term));
  });
}

function renderList() {
  const entries = filteredEntries();
  $("#listFooter").textContent = `${entries.length} of ${state.entries.length} entries`;
  $("#entryList").innerHTML = entries.length ? entries.map((entry) => `
    <button class="entry-row ${entry.id === state.selectedId ? "active" : ""}" data-entry-id="${entry.id}">
      <span class="entry-top">
        <span class="product">${esc(entry.source.productName)}</span>
        ${qualityDots(entry.qualityScore)}
      </span>
      <span class="entry-title">${esc(entry.title)}</span>
      <span class="entry-meta">
        ${entry.categories.slice(0, 2).map((cat) => `<span class="mini-tag">${cat}</span>`).join("")}
        ${entry.image.path ? `<span class="mini-tag">image</span>` : `<span class="mini-tag">link-only</span>`}
      </span>
    </button>
  `).join("") : `<div class="empty-state"><div><i data-lucide="search-x"></i><p>No entries match those filters yet — this is a small, hand-picked corpus, so try fewer.</p></div></div>`;
  renderIcons();
}

function setView(view) {
  state.view = view;
  document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.view === view));
  if (view === "form" && !state.draft) resetDraft();
  renderPage();
}

function selectedEntry() {
  return state.entries.find((entry) => entry.id === state.selectedId) || null;
}

function renderPage() {
  if (state.view === "form") renderForm();
  else if (state.view === "bulk") renderBulk();
  else if (state.view === "stats") renderStatsPage();
  else renderLibrary();
  renderIcons();
}

// Render the entry's structured layout field as a mini wireframe — this is the
// dogfood proof: the entry's own layout.regions drawn back as a diagram.
function renderLayoutWireframe(layout) {
  if (!layout?.form) return "";
  const widthFlex = (w) => (w === "fixed-narrow" ? "60px" : w === "fixed-wide" ? "120px" : "1fr");
  const isRow = ["two-column", "three-column"].includes(layout.form);
  const style = isRow
    ? `display:grid;grid-template-columns:${layout.regions.map((r) => widthFlex(r.width)).join(" ")};gap:4px`
    : `display:grid;gap:4px`;
  const blocks = layout.regions.map((r) =>
    `<div class="wire-block" data-role="${r.role}"><span>${r.role}</span></div>`
  ).join("");
  return `
    <div class="rail-card">
      <div class="section-title">Layout · ${layout.form}</div>
      <div class="wireframe" style="${style}">${blocks}</div>
    </div>`;
}

function renderLibrary() {
  const entry = selectedEntry();
  if (!entry) {
    $("#page").innerHTML = `<div class="empty-state"><div><i data-lucide="library"></i><p>The corpus starts empty on purpose — pick one example worth defending and add it.</p><button class="btn primary" id="emptyNew"><i data-lucide="plus"></i>New sample</button></div></div>`;
    return;
  }

  const image = entry.image.path
    ? `<img src="${API}/image?path=${encodeURIComponent(entry.image.path)}" alt="${esc(entry.title)}"><span class="badge image-badge">${entry.image.visibility}</span>`
    : `<div class="image-empty"><i data-lucide="image-off"></i><span>Link-only sample</span><span class="badge">${entry.image.visibility}</span></div>`;

  // Attributes block — was the right rail; now folded into the main card so the
  // whole shell is two columns. Renders only what the entry actually has.
  const attrs = `
    ${entry.layout ? `<div class="attr-block">${renderLayoutWireframe(entry.layout)}</div>` : ""}
    <div class="attr-block">
      <div class="section-title">Visual attributes</div>
      <div class="attr-grid">
        <div>
          <div class="swatches">
            ${entry.visual.dominantColors.map((c) => `<div class="swatch" style="background:${c}" title="${c}"></div>`).join("")}
            ${entry.visual.accentColor ? `<div class="swatch accent" style="background:${entry.visual.accentColor}" title="accent ${entry.visual.accentColor}"></div>` : ""}
          </div>
        </div>
        <dl>
          <div class="kv"><dt>Spacing</dt><dd>${entry.visual.spacingDensity}</dd></div>
          <div class="kv"><dt>Corners</dt><dd>${entry.visual.cornerStyle}</dd></div>
          <div class="kv"><dt>Shadows</dt><dd>${entry.visual.usesShadows ? "yes" : "no"}</dd></div>
          <div class="kv"><dt>Borders</dt><dd>${entry.visual.usesBorders ? "yes" : "no"}</dd></div>
          <div class="kv"><dt>Display</dt><dd>${entry.visual.typePairing.display || "—"}</dd></div>
          <div class="kv"><dt>Body</dt><dd>${entry.visual.typePairing.body || "—"}</dd></div>
          ${entry.visual.typePairing.notes ? `<div class="kv"><dt>Notes</dt><dd>${esc(entry.visual.typePairing.notes)}</dd></div>` : ""}
        </dl>
      </div>
    </div>
    ${entry.visual.colorRoles ? `
    <div class="attr-block">
      <div class="section-title">Color roles · token set</div>
      <div class="color-tokens">
        ${[
          ["canvas", entry.visual.colorRoles.canvas],
          ["surface", entry.visual.colorRoles.surface],
          ["ink", entry.visual.colorRoles.ink],
          entry.visual.colorRoles.muted ? ["muted", entry.visual.colorRoles.muted] : null,
          ["accent", entry.visual.colorRoles.accent],
        ].filter(Boolean).map(([role, hex]) =>
          `<div class="color-token"><span class="color-chip" style="background:${hex}"></span><span class="color-role">${role}</span><span class="color-hex">${hex}</span></div>`
        ).join("")}
      </div>
    </div>` : ""}
    ${entry.voice ? `
    <div class="attr-block">
      <div class="section-title">Voice</div>
      <div class="voice-tone">${esc(entry.voice.tone)}</div>
      <ul class="voice-examples">${entry.voice.examples.map((ex) => `<li>${esc(ex)}</li>`).join("")}</ul>
      ${entry.voice.avoid.length ? `<div class="voice-avoid">Avoids: ${entry.voice.avoid.map(esc).join("; ")}</div>` : ""}
    </div>` : ""}
  `;

  // ── Main canvas: the selected entry as a single card. One column, one job.
  $("#page").innerHTML = `
    <div class="canvas-card">
      <div class="card-head">
        <div>
          <div class="panel-title">${esc(entry.source.productName)}</div>
          <div class="panel-sub">${esc(entry.id)} · ${entry.patternType}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn" id="editSelected"><i data-lucide="pencil"></i>Edit</button>
          <button class="btn danger" id="deleteSelected"><i data-lucide="trash-2"></i>Delete</button>
        </div>
      </div>
      <div class="card-body detail-hero">
        <h1 class="sample-title">${esc(entry.title)}</h1>
        <div class="source-line">
          ${entry.source.url ? `<a href="${esc(entry.source.url)}" target="_blank" rel="noopener">${esc(entry.source.url)}</a>` : `<span>No source URL</span>`}
          <span>· ${entry.source.capturedAt}</span>
          ${qualityDots(entry.qualityScore)}
        </div>
        <div class="tag-row">
          ${entry.categories.map((cat) => `<span class="tag category">${cat}</span>`).join("")}
          ${entry.styleTags.map((tag) => `<span class="tag style">${tag}</span>`).join("")}
        </div>
        <div class="image-stage">${image}</div>
        <div class="copy-block">
          <section><h2 class="section-title">Critique</h2><p class="critique">${esc(entry.critique)}</p></section>
          <section><h2 class="section-title">What to steal</h2><ul class="steal-list">${entry.whatToSteal.map((item) => `<li>${esc(item)}</li>`).join("")}</ul></section>
          ${(entry.antiPatterns?.antiPatterns || []).length ? `<section><h2 class="section-title">Anti-patterns (mistakes avoided)</h2><ul class="avoid-list">${entry.antiPatterns.antiPatterns.map((item) => `<li>${esc(item)}</li>`).join("")}</ul></section>` : ""}
          ${(entry.antiPatterns?.whereThisFails || []).length ? `<section><h2 class="section-title">Where copying this fails</h2><ul class="avoid-list">${entry.antiPatterns.whereThisFails.map((item) => `<li>${esc(item)}</li>`).join("")}</ul></section>` : ""}
          ${(entry.antiPatterns?.accessibilityRisks || []).length ? `<section><h2 class="section-title">Accessibility risks</h2><ul class="avoid-list">${entry.antiPatterns.accessibilityRisks.map((item) => `<li>${esc(item)}</li>`).join("")}</ul></section>` : ""}
        </div>
        ${attrs}
      </div>
    </div>
  `;
}

function blankDraft() {
  return {
    id: "",
    title: "",
    patternType: "dashboard",
    categories: [],
    styleTags: [],
    source: { productName: "", url: null, capturedAt: today(), capturedBy: "self" },
    image: { visibility: "private", path: null, width: null, height: null },
    visual: {
      dominantColors: ["#ffffff", "#111111"],
      accentColor: null,
      typePairing: { display: null, body: null, notes: "" },
      spacingDensity: "moderate",
      cornerStyle: "slight-round",
      usesShadows: false,
      usesBorders: true,
    },
    critique: "",
    whatToSteal: [""],
    antiPatterns: { antiPatterns: [], whereThisFails: [], accessibilityRisks: [] },
    qualityTier: "exceptional",
    qualityScore: 4,
    addedAt: today(),
  };
}

function resetDraft(entry = null) {
  state.draft = entry ? JSON.parse(JSON.stringify(entry)) : blankDraft();
  state.draftMode = entry ? "edit" : "create";
  state.uploadedImage = null;
  state.bulkEditingIndex = null;
}

function syncDraftFromForm() {
  if (!state.draft || !$("#entryForm")) return;
  const form = $("#entryForm");
  const isEditing = state.draftMode === "edit";
  const productName = form.productName.value.trim();
  const title = form.title.value.trim();
  const proposedId = slugify(`${productName}-${title || "sample"}`).slice(0, 80);
  state.draft.id = isEditing && form.id ? form.id.value.trim() || proposedId : "";
  state.draft.title = title;
  state.draft.source.productName = productName;
  state.draft.source.url = form.url.value.trim() || null;
  state.draft.source.capturedAt = form.capturedAt.value;
  state.draft.source.capturedBy = form.capturedBy.value;
  state.draft.categories = [...new Set([
    form.primaryCategory.value,
    ...[...form.querySelectorAll("input[name='categories']:checked")].map((input) => input.value),
  ].filter(Boolean))];
  state.draft.styleTags = [...new Set([
    form.primaryStyleTag.value,
    ...[...form.querySelectorAll("input[name='styleTags']:checked")].map((input) => input.value),
  ].filter(Boolean))];
  state.draft.patternType = form.patternType.value;
  state.draft.image.visibility = form.visibility.value;
  state.draft.image.path = form.imagePath.value.trim() || null;
  state.draft.image.width = form.imageWidth.value ? Number(form.imageWidth.value) : null;
  state.draft.image.height = form.imageHeight.value ? Number(form.imageHeight.value) : null;
  state.draft.visual.dominantColors = lines(form.dominantColors.value);
  state.draft.visual.accentColor = form.accentColor.value.trim() || null;
  state.draft.visual.typePairing.display = form.displayFont.value.trim() || null;
  state.draft.visual.typePairing.body = form.bodyFont.value.trim() || null;
  state.draft.visual.typePairing.notes = form.typeNotes.value.trim() || undefined;
  state.draft.visual.spacingDensity = form.spacingDensity.value;
  state.draft.visual.cornerStyle = form.cornerStyle.value;
  state.draft.visual.usesShadows = form.usesShadows.checked;
  state.draft.visual.usesBorders = form.usesBorders.checked;
  state.draft.critique = form.critique.value.trim();
  state.draft.whatToSteal = lines(form.whatToSteal.value);
  state.draft.antiPatterns = {
    antiPatterns: lines(form.antiPatterns.value),
    whereThisFails: lines(form.whereThisFails.value),
    accessibilityRisks: lines(form.accessibilityRisks.value),
  };
  // Voice + qualityTier + colorRoles — all optional/advanced.
  if (form.voiceTone && form.voiceTone.value.trim()) {
    state.draft.voice = {
      tone: form.voiceTone.value.trim(),
      examples: lines(form.voiceExamples.value),
      avoid: lines(form.voiceAvoid.value),
    };
  } else {
    state.draft.voice = undefined;
  }
  if (form.colorRolesCanvas && form.colorRolesCanvas.value.trim()) {
    state.draft.visual.colorRoles = {
      canvas: form.colorRolesCanvas.value.trim(),
      surface: form.colorRolesSurface.value.trim(),
      ink: form.colorRolesInk.value.trim(),
      muted: form.colorRolesMuted.value.trim() || null,
      accent: form.colorRolesAccent.value.trim(),
    };
  } else {
    state.draft.visual.colorRoles = undefined;
  }
  state.draft.qualityTier = form.qualityTier ? form.qualityTier.value : "exceptional";
  state.draft.qualityScore = Number(form.qualityScore.value);
  state.draft.addedAt = form.addedAt.value;
}

function validateDraft() {
  const entry = state.draft;
  const issues = [];
  if (state.draftMode === "edit" && !/^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(entry.id)) issues.push("Use a stable kebab-case id.");
  if (state.draftMode === "edit" && state.entries.some((candidate) => candidate.id === entry.id && candidate.id !== state.selectedId)) issues.push("That id already exists.");
  if (!entry.title) issues.push("Add a title.");
  if (!entry.source.productName) issues.push("Add a product name.");
  if (entry.source.url && !/^https?:\/\/.+/.test(entry.source.url)) issues.push("Use a valid source URL or leave it blank.");
  if (!entry.categories.length) issues.push("Choose at least one category.");
  if (!entry.styleTags.length) issues.push("Choose at least one style tag.");
  if (!entry.visual.dominantColors.length || !entry.visual.dominantColors.every((color) => /^#[0-9a-fA-F]{6}$/.test(color))) issues.push("Dominant colors must be #RRGGBB values.");
  if (entry.visual.accentColor && !/^#[0-9a-fA-F]{6}$/.test(entry.visual.accentColor)) issues.push("Accent color must be #RRGGBB or blank.");
  if (entry.critique.length < 80) issues.push("Critique must be at least 80 characters.");
  if (!entry.whatToSteal.length || entry.whatToSteal.some((item) => item.length < 10)) issues.push("Add at least one concrete technique.");
  if (!entry.antiPatterns || !entry.antiPatterns.antiPatterns || !entry.antiPatterns.antiPatterns.length || entry.antiPatterns.antiPatterns.some((a) => a.length < 10)) issues.push("Add at least one anti-pattern (what mistake does this design avoid?).");
  if (!entry.image.path) issues.push("Capture or upload a screenshot before saving.");
  if (entry.image.visibility !== "private" && (!entry.image.path || !entry.image.width || !entry.image.height)) issues.push("Public images need path, width, and height.");
  if (entry.image.path && !/^(images-private|images-public)\/[^/].+/.test(entry.image.path)) issues.push("Image path must be corpus-relative.");
  // Draft-hygiene gate (mirrors the centralized findDraftMarkers in schema.ts):
  // block save if any text field still carries a [DRAFT]/[PLACEHOLDER]/[TODO] marker.
  const draftTexts = [
    entry.critique, ...entry.whatToSteal,
    ...(entry.antiPatterns?.antiPatterns || []), ...(entry.antiPatterns?.whereThisFails || []), ...(entry.antiPatterns?.accessibilityRisks || []),
    ...(entry.voice ? [entry.voice.tone, ...entry.voice.examples, ...entry.voice.avoid] : []),
  ];
  if (draftTexts.some((t) => /\[(?:DRAFT|PLACEHOLDER|TODO\b)/i.test(t))) issues.push("Remove all [DRAFT] / [PLACEHOLDER] / [TODO] markers before saving — rewrite those fields in your own words.");
  return issues;
}

  if (autoFill) autoFill.disabled = !state.config.visionKeyConfigured || !state.draft.image.path;

async function saveDraft() {
  syncDraftFromForm();
  const issues = validateDraft();
  if (issues.length) {
    toast(issues[0], "error");
    updatePreview();
    return;
  }
  // Editing a bulk-queue item: write back to the queue, not the corpus.
  if (state.bulkEditingIndex !== null && state.bulkEditingIndex >= 0 && state.bulkQueue[state.bulkEditingIndex]) {
    const idx = state.bulkEditingIndex;
    const prev = state.bulkQueue[idx];
    state.bulkQueue[idx] = { ...JSON.parse(JSON.stringify(state.draft)), _status: prev._status, _error: null, _filename: prev._filename };
    state.bulkEditingIndex = null;
    state.draft = null;
    setView("bulk");
    toast("Updated queue item", "success");
    return;
  }
  const isEditing = state.draftMode === "edit";
  try {
    const data = await request(isEditing ? `/entries/${encodeURIComponent(state.draft.id)}` : "/entries", {
      method: isEditing ? "PUT" : "POST",
      body: JSON.stringify(state.draft),
    });
    state.selectedId = data.entry.id;
    state.draft = null;
    await loadAll({ keepSelection: true });
    setView("detail");
    toast("Saved", "success");
  } catch (error) {
    toast(error.message, "error");
  }
}

// Strip any [DRAFT...]/[PLACEHOLDER...]/[TODO...] marker the tagger prepends.
// Matches the centralized server gate (findDraftMarkers in schema.ts) exactly:
// it rejects all three, so the client-side stripper must too — otherwise a row
// auto-critiqued in bulk stays uncommittable. Marker may sit anywhere in the
// string (the model occasionally wraps it mid-sentence), and may repeat, so we
// loop until stable.
function stripDraftMarker(s) {
  if (typeof s !== "string") return s;
  let prev;
  let out = s;
  do {
    prev = out;
    out = out.replace(/\[(?:DRAFT|PLACEHOLDER|TODO)[^\]]*\]\s*/gi, "");
  } while (out !== prev);
  return out.trim();
}

// Apply stripDraftMarker to every free-text field the hygiene gate inspects —
// the same field set entryTextFields() enumerates server-side. Used by both the
// single-sample auto-fill and the bulk critique pass so they share one rule.
function stripMarkersFromEntry(entry) {
  const e = entry;
  if (typeof e.critique === "string") e.critique = stripDraftMarker(e.critique);
  if (Array.isArray(e.whatToSteal)) e.whatToSteal = e.whatToSteal.map(stripDraftMarker);
  if (e.antiPatterns) {
    if (Array.isArray(e.antiPatterns.antiPatterns)) e.antiPatterns.antiPatterns = e.antiPatterns.antiPatterns.map(stripDraftMarker);
    if (Array.isArray(e.antiPatterns.whereThisFails)) e.antiPatterns.whereThisFails = e.antiPatterns.whereThisFails.map(stripDraftMarker);
    if (Array.isArray(e.antiPatterns.accessibilityRisks)) e.antiPatterns.accessibilityRisks = e.antiPatterns.accessibilityRisks.map(stripDraftMarker);
  }
  if (e.voice) {
    if (typeof e.voice.tone === "string") e.voice.tone = stripDraftMarker(e.voice.tone);
    if (Array.isArray(e.voice.examples)) e.voice.examples = e.voice.examples.map(stripDraftMarker);
    if (Array.isArray(e.voice.avoid)) e.voice.avoid = e.voice.avoid.map(stripDraftMarker);
  }
  return e;
}

function cleanTaggedDraft(entry, previous) {
  const cleaned = JSON.parse(JSON.stringify(entry));
  cleaned.title = cleaned.title.replace(" — (add descriptive subtitle)", "");
  stripMarkersFromEntry(cleaned);
  // The server owns id assignment for both new single samples and bulk items.
  // Keep an existing id only when explicitly editing a saved entry (draftMode
  // === "edit" and NOT a bulk-queue edit, which uses bulkEditingIndex).
  const editingSaved = state.draftMode === "edit" && state.bulkEditingIndex === null;
  if (!editingSaved) cleaned.id = "";
  cleaned.image = previous.image;
  // Preserve the user's qualityScore and qualityTier — don't let auto-fill
  // overwrite them. Cautionary entries should stay low-scored.
  cleaned.qualityScore = previous.qualityScore || cleaned.qualityScore || 4;
  if (previous.qualityTier) cleaned.qualityTier = previous.qualityTier;
  cleaned.addedAt = previous.addedAt || today();
  return cleaned;
}

// ── Bulk import ────────────────────────────────────────────────────────────
// Mirrors the terminal bulk-import.ts flow: upload → stage blank drafts →
// Auto-fill all (OpenAI vision) → review → commit. The server endpoints are
// unchanged; the browser orchestrates them with a small bounded-concurrency
// pool so we don't fire N simultaneous uploads.

const KNOWN_PRODUCTS = {
  linear:      { name: "Linear",      url: "https://linear.app" },
  stripe:      { name: "Stripe",      url: "https://stripe.com" },
  vercel:      { name: "Vercel",      url: "https://vercel.com" },
  arc:         { name: "Arc",         url: "https://arc.net" },
  notion:      { name: "Notion",      url: "https://notion.so" },
  figma:       { name: "Figma",       url: "https://figma.com" },
  github:      { name: "GitHub",      url: "https://github.com" },
  raycast:     { name: "Raycast",     url: "https://raycast.com" },
  craft:       { name: "Craft",       url: "https://craft.do" },
  loom:        { name: "Loom",        url: "https://loom.com" },
  retool:      { name: "Retool",      url: "https://retool.com" },
  planetscale: { name: "PlanetScale", url: "https://planetscale.com" },
  supabase:    { name: "Supabase",    url: "https://supabase.com" },
  resend:      { name: "Resend",      url: "https://resend.com" },
  clerk:       { name: "Clerk",       url: "https://clerk.com" },
};

function inferProduct(filename) {
  const stem = filename.replace(/\.[^.]+$/, "");
  const slug = stem.split("__")[0].toLowerCase().replace(/[^a-z0-9]/g, "-");
  return KNOWN_PRODUCTS[slug] ?? null;
}

async function runWithPool(tasks, limit, onResult, onError) {
  const queue = [...tasks.entries()];
  let active = 0;
  await new Promise((resolve) => {
    const next = () => {
      while (active < limit && queue.length > 0) {
        const [i, task] = queue.shift();
        active += 1;
        task()
          .then((r) => onResult(r, i))
          .catch((e) => onError(e, i))
          .finally(() => { active -= 1; next(); if (active === 0 && queue.length === 0) resolve(); });
      }
    };
    if (tasks.length === 0) resolve();
    next();
  });
}

function bulkTally() {
  const q = state.bulkQueue;
  return {
    total: q.length,
    staged: q.filter((i) => i._status === "staged").length,
    extraction: q.filter((i) => i._status === "extraction").length,
    tagging: q.filter((i) => i._status === "tagging").length,
    tagged: q.filter((i) => i._status === "tagged").length,
    error: q.filter((i) => i._status === "error").length,
    committed: q.filter((i) => i._status === "committed").length,
  };
}

function renderBulk() {
  const t = bulkTally();
  const keyReady = state.config.visionKeyConfigured;
  const keyStatus = keyReady
    ? `<div class="key-status ready">Auto-fill: ${esc(state.config.extractionProvider || "openai")} (${esc(state.config.extractionModel || "?")}) → ${esc(state.config.critiqueProvider || "openai")} (${esc(state.config.critiqueModel || "?")}).</div>`
    : `<div class="key-status missing">Auto-fill needs a vision provider key in .env. Staging still works; tag later.</div>`;
  const autoFillBtn = `<button class="btn" id="bulkAutoFill" ${(!t.staged || !keyReady) ? "disabled" : ""}><i data-lucide="wand-sparkles"></i>Auto-fill all (${t.staged})</button>`;
  // Deferred Pass 2: only enabled when rows sit in 'extraction' status awaiting
  // critique. This is the button that spends the critique tokens.
  const critiqueBtn = `<button class="btn" id="bulkCritique" ${(!t.extraction || !keyReady) ? "disabled" : ""}><i data-lucide="pen-line"></i>Generate critique (${t.extraction})</button>`;
