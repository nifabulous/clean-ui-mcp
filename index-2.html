<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clean-ui curator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    /*
     * Design tokens — derived from the corpus's own entries, not invented.
     *
     * Depth via background-color steps (Linear): "Use 2-3 background shades of
     * the same hue for depth instead of box-shadow." Three cool-gray steps.
     *
     * Accent = Stripe indigo #635bff (from corpus). Used for state only.
     *
     * Metadata text darkened past Linear's a11y caveat: "Extremely low contrast
     * on metadata text — borderline accessibility issue if copied literally."
     * --faint targets ≥4.5:1 on white (WCAG AA for normal text).
     */
    --bg:          #f7f8fa;   /* step 1: app canvas (coolest, darkest of the light shades) */
    --surface:     #ffffff;   /* step 2: panels/cards sit one shade lighter than canvas */
    --surface-2:   #f1f2f6;   /* step 3: insets, active rows, inputs — deepest "pressed" layer */
    --surface-3:   #e8eaf0;   /* hover ground on the canvas shade */
    --ink:         #0a0c10;   /* primary text — near-black, slight blue undertone */
    --muted:       #525866;   /* secondary text — contrast ≥7:1 on white, safe for labels */
    --faint:       #6b7280;   /* metadata — ≥4.5:1 on white (the Linear a11y fix) */
    --line:        #e6e8ec;   /* hairline borders — "read as structure, not decoration" (Linear) */
    --line-2:      #d8dbe2;   /* stronger hairline, for dividers doing structural work */
    /* Stripe indigo — from our corpus, reserved for state (focus, selected, primary). */
    --accent:      #635bff;
    --accent-2:    #4f46e5;   /* hover — pressed indigo */
    --accent-soft: #f0effe;   /* selected-row tint, barely indigo */
    --accent-ring: rgba(99,91,255,.16);
    /* Semantic, used sparingly. */
    --green:       #16a34a;
    --green-soft:  #ecfdf3;
    --red:         #dc2626;
    --red-soft:    #fef2f2;
    --amber:       #b45309;
    --amber-soft:  #fffbeb;
    --violet:      #6d28d9;
    --violet-soft: #f5f3ff;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menos, monospace;
    --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --r-sm: 6px;
    --r:    8px;
    --r-lg: 10px;
  }

  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; -webkit-font-smoothing: antialiased; }
  body { overflow: hidden; }
  button, input, textarea, select { font: inherit; color: inherit; }
  button { cursor: pointer; background: none; border: 0; }
  ::selection { background: var(--accent-ring); }
  code { font-family: var(--mono); font-size: .92em; background: var(--surface-2); padding: 1px 5px; border-radius: 4px; }

  /* ── App shell ─────────────────────────────────────────────── */
  #app { height: 100vh; display: grid; grid-template-rows: 50px 1fr; }

  .topbar {
    display: flex; align-items: center; gap: 14px; padding: 0 16px;
    background: var(--bg); border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 9px; min-width: 210px; font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
  .brand-mark { width: 22px; height: 22px; display: grid; place-items: center; border-radius: var(--r-sm); background: var(--accent); color: #fff; }
  .brand-mark svg { width: 14px; height: 14px; }
  .brand small { display: block; color: var(--faint); font: 500 11px/1 var(--mono); margin-top: 1px; }

  .search { position: relative; flex: 1; max-width: 520px; }
  .search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--faint); }
  .search input {
    width: 100%; height: 34px; border: 1px solid transparent; border-radius: var(--r-sm);
    padding: 0 12px 0 33px; color: var(--ink); background: var(--surface-2);
    outline: none; transition: border-color .15s, background .15s;
  }
  .search input::placeholder { color: var(--faint); }
  .search input:focus { border-color: var(--line-2); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-ring); }

  .top-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }

  /* ── Buttons ───────────────────────────────────────────────── */
  .btn {
    height: 32px; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 0 11px; border: 1px solid var(--line-2); border-radius: var(--r-sm);
    background: var(--surface); color: var(--ink); font-weight: 500; font-size: 13px; white-space: nowrap;
    transition: border-color .15s, background .15s, color .15s;
  }
  .btn svg { width: 15px; height: 15px; }
  .btn:hover { border-color: var(--faint); background: var(--surface-2); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn.danger { color: var(--red); border-color: #f3c9c9; }
  .btn.danger:hover { background: var(--red-soft); border-color: #e8a4a4; }
  .btn.icon { width: 32px; padding: 0; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--line-2); background: var(--surface); }

  /* ── Layout shell ──────────────────────────────────────────── */
  /*
   * Three-zone dashboard shell — structure derived from the corpus's own
   * layout field: the Origin dashboards describe a "three-column" form with
   * regions [primary-nav, main-canvas, detail-rail]. The curator is now built
   * in that form. Left nav + card-based main canvas + right detail rail.
   */
  .shell { min-height: 0; display: grid; grid-template-columns: 240px minmax(0, 1fr) 300px; }
  aside { min-height: 0; border-right: 1px solid var(--line); background: var(--bg); display: grid; grid-template-rows: auto auto 1fr auto; }

  /* Summary strip (Origin-2: equal-width metrics with hairline dividers). */
  .stat-strip { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--line); background: var(--surface); }
  .stat { padding: 10px 12px; border-right: 1px solid var(--line); }
  .stat:last-child { border-right: 0; }
  .stat b { display: block; font: 600 18px/1 var(--sans); color: var(--ink); letter-spacing: -0.01em; }
  .stat span { display: block; margin-top: 4px; color: var(--muted); font: 500 10px/1 var(--sans); text-transform: uppercase; letter-spacing: 0.06em; }

  /* Sidebar filters */
  .filters { border-bottom: 1px solid var(--line); }
  .filters summary {
    min-height: 36px; display: flex; align-items: center; padding: 0 14px;
    font: 500 12px/1 var(--sans); color: var(--muted); cursor: pointer; list-style: none;
  }
  .filters summary::-webkit-details-marker { display: none; }
  .filters summary::before { content: "Filters"; }
  .filter-body { padding: 0 14px 14px; display: grid; gap: 12px; }
  .filter-title { font: 600 11px/1 var(--sans); color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    min-height: 22px; border: 1px solid transparent; border-radius: 999px; background: var(--surface-2);
    color: var(--muted); padding: 0 9px; font: 500 11px/20px var(--sans); transition: all .12s;
  }
  .chip:hover { background: var(--surface-3); }
  .chip.active { background: var(--accent-soft); color: var(--accent); }

  /* Sidebar entry list */
  .entry-list { min-height: 0; overflow: auto; padding: 6px; }
  .entry-row {
    width: 100%; text-align: left; border: 1px solid transparent; border-left: 2px solid transparent; border-radius: var(--r-sm);
    background: transparent; padding: 9px 10px 9px 10px; display: grid; gap: 4px; transition: background .12s;
  }
  .entry-row:hover { background: var(--surface-2); }
  .entry-row.active { background: var(--accent-soft); border-left-color: var(--accent); }
  .entry-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .product { font: 500 12px/1.2 var(--sans); color: var(--ink); }
  .quality { display: flex; gap: 2px; }
  .quality i { width: 5px; height: 5px; border-radius: 50%; background: var(--line-2); display: block; }
  .quality i.on { background: var(--accent); }
  .entry-title { color: var(--muted); font-weight: 400; font-size: 12px; line-height: 1.35; overflow-wrap: anywhere; }
  .entry-meta { display: flex; gap: 4px; flex-wrap: wrap; }
  .mini-tag { color: var(--faint); font: 500 10px/1.2 var(--mono); }
  .mini-tag::before { content: "#"; opacity: .5; }
  .list-footer { padding: 10px 14px; color: var(--faint); border-top: 1px solid var(--line); font: 500 11px/1.2 var(--sans); }

  /* Main workspace */
  main { min-width: 0; min-height: 0; overflow: auto; }
  .workspace { min-height: 100%; display: grid; grid-template-rows: auto 1fr; }
  .tabs { height: 42px; display: flex; align-items: center; gap: 2px; padding: 0 16px; border-bottom: 1px solid var(--line); background: var(--bg); position: sticky; top: 0; z-index: 5; }
  .tab {
    height: 42px; border: 0; border-bottom: 2px solid transparent; background: transparent;
    padding: 0 12px; color: var(--faint); font-weight: 500; font-size: 13px; transition: color .12s;
  }
  .tab:hover { color: var(--muted); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }

  .page { padding: 20px; }

  /* ── Grids / panels ────────────────────────────────────────── */
  /* Layouts are single-column now: the right rail is a persistent shell zone,
     not a column inside #page. See .shell (three-column grid). */
  .detail-layout, .library-grid, .form-layout { display: grid; gap: 16px; align-items: start; }

  /* The main canvas: a card sitting on the canvas shade (elevated via --surface on --bg). */
  .canvas-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
    overflow: hidden;
  }
  .canvas-card > .card-head {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid var(--line);
  }
  .canvas-card > .card-body { padding: 18px; display: grid; gap: 16px; }

  /* The right detail rail: stacked small cards (Origin's "right rail of stacked supporting content"). */
  .right-rail { min-height: 0; border-left: 1px solid var(--line); background: var(--bg); overflow: auto; }
  .rail-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 14px; }
  .rail-card + .rail-card { margin-top: 12px; }
  .rail-card .section-title { margin-bottom: 10px; }

  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); }
  .panel-head { min-height: 50px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); }
  .panel-title { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
  .panel-sub { color: var(--faint); font: 500 11px/1.3 var(--sans); margin-top: 2px; }
  .panel-body { padding: 16px; }

  /* ── Detail view ───────────────────────────────────────────── */
  .detail-hero { display: grid; gap: 14px; }
  .sample-title { margin: 0; font-size: 26px; line-height: 1.2; font-weight: 600; letter-spacing: -0.02em; overflow-wrap: anywhere; }
  .source-line { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; color: var(--faint); font: 500 12px/1.2 var(--sans); }
  .source-line a { color: var(--accent); text-decoration: none; }
  .source-line a:hover { text-decoration: underline; }
  .tag-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { border-radius: var(--r-sm); padding: 3px 8px; font: 500 11px/1.3 var(--sans); }
  .tag.category { color: var(--accent); background: var(--accent-soft); }
  .tag.style { color: var(--violet); background: var(--violet-soft); }

  .image-stage {
    min-height: 300px; aspect-ratio: 16 / 10; border: 1px solid var(--line); border-radius: var(--r);
    background: var(--surface-2); display: grid; place-items: center; overflow: hidden; position: relative;
  }
  .image-stage img { width: 100%; height: 100%; object-fit: contain; display: block; background: var(--surface); }
  .image-empty { text-align: center; color: var(--faint); display: grid; gap: 8px; justify-items: center; }
  .image-empty svg { width: 30px; height: 30px; }
  .badge {
    display: inline-flex; align-items: center; height: 20px; border-radius: 999px; padding: 0 8px;
    font: 500 10px/1 var(--mono); color: var(--muted); background: var(--surface-2);
  }
  .image-badge { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,.92); backdrop-filter: blur(6px); }

  .copy-block { display: grid; gap: 20px; margin-top: 8px; }
  /* Spaced uppercase eyebrow (Origin technique) — but at --muted (≥7:1), not --faint.
     The corpus warns Linear's low-contrast metadata is "borderline accessibility issue." */
  .section-title {
    margin: 0 0 8px; color: var(--muted); font: 600 11px/1 var(--sans);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .critique { margin: 0; font-size: 15px; line-height: 1.65; color: var(--ink); }
  .steal-list, .avoid-list { margin: 0; padding: 0; list-style: none; display: grid; gap: 8px; }
  .steal-list li, .avoid-list li { display: grid; grid-template-columns: 18px 1fr; gap: 8px; line-height: 1.55; font-size: 14px; }
  .steal-list li::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-top: 7px; }
  .avoid-list li::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--amber); margin-top: 7px; }

  /* ── Entry cards (all-entries sidebar list) ────────────────── */
  .all-entries { display: grid; gap: 6px; }
  .entry-card {
    width: 100%; text-align: left; border: 1px solid transparent; border-radius: var(--r-sm);
    background: transparent; padding: 9px 10px; display: grid; gap: 4px; transition: background .12s;
  }
  .entry-card:hover { background: var(--surface-2); }
  .entry-card.active { background: var(--accent-soft); border-color: var(--line-2); }

  /* ── Attribute grid ────────────────────────────────────────── */
  .attr-grid { display: grid; gap: 16px; }
  .swatches { display: flex; flex-wrap: wrap; gap: 6px; }
  .swatch { width: 30px; height: 30px; border-radius: var(--r-sm); border: 1px solid rgba(0,0,0,.08); position: relative; }
  .swatch.accent { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Color roles — labeled token strip (canvas/surface/ink/muted/accent). */
  .color-tokens { display: grid; gap: 6px; }
  .color-token { display: grid; grid-template-columns: 22px 1fr auto; gap: 8px; align-items: center; }
  .color-chip { width: 22px; height: 22px; border-radius: 5px; border: 1px solid rgba(0,0,0,.1); }
  .color-role { font: 500 12px/1 var(--sans); color: var(--muted); text-transform: capitalize; }
  .color-hex { font: 500 11px/1 var(--mono); color: var(--faint); }

  /* Voice block. */
  .voice-tone { font-weight: 550; font-size: 13px; margin-bottom: 8px; }
  .voice-examples { margin: 0; padding: 0; list-style: none; display: grid; gap: 6px; }
  .voice-examples li { font-size: 13px; line-height: 1.5; color: var(--ink); padding-left: 14px; position: relative; }
  .voice-examples li::before { content: "\201C"; position: absolute; left: 0; color: var(--faint); }
  .voice-avoid { margin-top: 8px; font-size: 12px; color: var(--amber); line-height: 1.4; }
  .kv { display: grid; grid-template-columns: 120px 1fr; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--line); }
  .kv:last-child { border-bottom: 0; }
  .kv dt { color: var(--faint); font: 500 12px/1.3 var(--sans); }
  .kv dd { margin: 0; font-weight: 500; font-size: 13px; }

  /* ── Layout wireframe (renders the entry's structured layout.regions) ──── */
  .wireframe { margin-top: 4px; }
  .wire-block {
    border: 1px solid var(--line-2); border-radius: 4px; background: var(--surface-2);
    min-height: 34px; display: grid; place-items: center; padding: 4px;
    color: var(--muted); font: 500 9px/1.1 var(--mono); text-align: center; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .wire-block[data-role="primary-nav"], .wire-block[data-role="icon-nav"] { background: var(--surface-3); }
  .wire-block[data-role="main-canvas"] { min-height: 60px; background: var(--surface); border-color: var(--line-2); }
  .wire-block[data-role="summary-strip"] { min-height: 22px; }
  .wire-block[data-role="overlay-card"] { min-height: 60px; }

  /* ── Form ──────────────────────────────────────────────────── */
  form { display: grid; gap: 20px; }
  fieldset { border: 0; padding: 0; margin: 0; display: grid; gap: 12px; }
  legend { padding: 0; font: 600 11px/1 var(--sans); color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  label { display: grid; gap: 5px; color: var(--muted); font: 500 12px/1.3 var(--sans); }
  input, textarea, select {
    width: 100%; border: 1px solid var(--line-2); border-radius: var(--r-sm); background: var(--surface);
    color: var(--ink); padding: 8px 10px; outline: none; font-size: 13px; transition: border-color .15s;
  }
  input::placeholder, textarea::placeholder { color: var(--faint); }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
  textarea { min-height: 88px; resize: vertical; line-height: 1.5; }
  input[type="color"] { height: 36px; padding: 3px; }

  .check-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .check-chip input { position: absolute; opacity: 0; pointer-events: none; }
  .check-chip span {
    display: inline-flex; align-items: center; min-height: 26px; border: 1px solid var(--line-2);
    border-radius: 999px; padding: 0 10px; background: var(--surface); color: var(--muted);
    font: 500 11px/1 var(--sans); transition: all .12s;
  }
  .check-chip:hover span { border-color: var(--faint); }
  .check-chip input:checked + span { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  .dropzone {
    min-height: 130px; border: 1px dashed var(--line-2); border-radius: var(--r); background: var(--surface-2);
    display: grid; place-items: center; text-align: center; padding: 16px; color: var(--muted); transition: all .15s;
  }
  .dropzone.drag { border-color: var(--accent); background: var(--accent-soft); }
  .dropzone input { display: none; }
  .dropzone strong { display: block; color: var(--ink); margin-bottom: 4px; font-weight: 600; }

  .source-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .source-action {
    min-height: 74px; border: 1px solid var(--line-2); border-radius: var(--r); background: var(--surface);
    display: grid; align-content: center; justify-items: center; gap: 5px; color: var(--muted);
    font-weight: 500; font-size: 12px; transition: all .15s;
  }
  .source-action svg { width: 18px; height: 18px; color: var(--accent); }
  .source-action:hover { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-2); }

  .image-preview { border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; background: var(--surface-2); }
  .image-preview img { width: 100%; max-height: 280px; object-fit: contain; display: block; background: var(--surface); }
  .image-preview figcaption { padding: 8px 12px; color: var(--muted); font: 500 11px/1.3 var(--sans); border-top: 1px solid var(--line); }
  .image-ready { color: var(--green); }

  /* ── Callouts ──────────────────────────────────────────────── */
  .legacy-note { border: 1px solid #f0dca8; background: var(--amber-soft); color: var(--amber); border-radius: var(--r-sm); padding: 9px 12px; font-weight: 500; font-size: 13px; line-height: 1.45; }
  .key-status { border: 1px solid var(--line-2); border-radius: var(--r-sm); padding: 9px 12px; background: var(--surface); color: var(--muted); font-weight: 500; font-size: 13px; line-height: 1.45; }
  .key-status.ready { border-color: #c3e6cb; background: var(--green-soft); color: var(--green); }
  .key-status.missing { border-color: #f0dca8; background: var(--amber-soft); color: var(--amber); }
  .starter { border: 1px solid var(--line); background: var(--surface-2); border-radius: var(--r-sm); padding: 11px 13px; display: grid; gap: 5px; color: var(--muted); font-size: 13px; line-height: 1.5; }
  .starter strong { color: var(--ink); font-weight: 600; }
  .starter p { margin: 0; }
  .starter em { font-style: normal; color: var(--ink); font-weight: 500; }

  /* ── Disclosure (advanced) ─────────────────────────────────── */
  .advanced { border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--surface); overflow: hidden; }
  .advanced summary {
    min-height: 40px; display: flex; align-items: center; padding: 0 13px;
    font: 500 13px/1 var(--sans); color: var(--muted); cursor: pointer; list-style: none;
  }
  .advanced summary::-webkit-details-marker { display: none; }
  .advanced summary::before { content: "▸"; margin-right: 8px; color: var(--faint); transition: transform .15s; }
  .advanced[open] summary::before { transform: rotate(90deg); }
  .advanced summary:hover { color: var(--ink); }
  .advanced-body { padding: 0 13px 13px; display: grid; gap: 12px; }

  /* ── Validation / JSON preview ─────────────────────────────── */
  .json-tools { display: grid; gap: 10px; }
  .validation { display: grid; gap: 6px; }
  .issue { display: grid; grid-template-columns: 16px 1fr; gap: 7px; color: var(--red); font: 500 13px/1.4 var(--sans); }
  .issue svg { width: 15px; height: 15px; margin-top: 1px; }
  .issue.ok { color: var(--green); }
  .preview-json {
    margin: 0; overflow: auto; max-height: 340px; background: #1a1b1e; color: #c9d1d9;
    border-radius: var(--r-sm); padding: 12px; font: 500 11px/1.55 var(--mono);
  }

  /* ── Empty + toast ─────────────────────────────────────────── */
  .empty-state { min-height: calc(100vh - 110px); display: grid; place-items: center; color: var(--faint); text-align: center; }
  .empty-state svg { width: 38px; height: 38px; margin-bottom: 10px; }
  .empty-state p { margin: 0 0 12px; }

  .toast {
    position: fixed; right: 18px; bottom: 18px; z-index: 20; padding: 10px 14px; border-radius: var(--r-sm);
    border: 1px solid var(--line-2); background: var(--surface); box-shadow: 0 8px 24px rgba(24,24,27,.08);
    font-weight: 500; font-size: 13px; transform: translateY(8px); opacity: 0; pointer-events: none; transition: .18s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { color: var(--green); border-color: #c3e6cb; }
  .toast.error { color: var(--red); border-color: #f3c9c9; }

  /* ── Bulk import ───────────────────────────────────────────── */
  .bulk-empty { padding: 36px 20px; text-align: center; color: var(--faint); }
  .bulk-empty svg { width: 36px; height: 36px; margin-bottom: 10px; }
  .bulk-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .bulk-bar label.bulk-add { display: inline-flex; align-items: center; gap: 6px; }
  .bulk-default-product { flex: 1; min-width: 180px; }
  .bulk-queue { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
  .bulk-row {
    display: grid; grid-template-columns: 52px 1fr auto; gap: 12px; align-items: center;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 10px; transition: border-color .12s;
  }
  .bulk-row:hover { border-color: var(--line-2); }
  .bulk-row.committing { opacity: .65; }
  .bulk-row.error { border-color: #f3c9c9; background: var(--red-soft); }
  .bulk-row .thumb {
    width: 52px; height: 38px; object-fit: cover; border-radius: 4px; background: var(--surface-3); border: 1px solid var(--line);
  }
  .bulk-row .thumb.empty { display: grid; place-items: center; color: var(--faint); }
  .bulk-row .thumb.empty svg { width: 16px; height: 16px; }
  .bulk-row .meta { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .bulk-row .meta .filename { font: 500 11px/1.2 var(--mono); color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bulk-row .meta .product-input {
    border: 1px solid var(--line-2); border-radius: 5px; padding: 4px 8px; height: 28px; width: 100%;
    max-width: 300px; background: var(--surface); font-size: 12px;
  }
  .bulk-row .meta .err { color: var(--red); font-size: 11px; }
  .bulk-row .actions { display: flex; gap: 6px; align-items: center; }
  .bulk-row .remove { width: 28px; height: 28px; padding: 0; color: var(--faint); border: 1px solid transparent; }
  .bulk-row .remove:hover { color: var(--red); border-color: var(--line-2); background: var(--surface-2); }
  .status-chip {
    border-radius: 999px; padding: 2px 8px; font: 500 10px/1.4 var(--sans); white-space: nowrap;
  }
  .status-chip.staged { color: var(--amber); background: var(--amber-soft); }
  .status-chip.tagging { color: var(--accent); background: var(--accent-soft); }
  .status-chip.tagged { color: var(--green); background: var(--green-soft); }
  .status-chip.error { color: var(--red); background: var(--red-soft); }
  .status-chip.committed { color: var(--faint); background: var(--surface-2); }
  .status-chip.committing { color: var(--accent); background: var(--accent-soft); }
  .queue-tally { display: flex; gap: 16px; flex-wrap: wrap; }
  .queue-tally .t { font: 500 12px/1.3 var(--sans); color: var(--faint); }
  .queue-tally .t b { font-size: 15px; color: var(--ink); font-weight: 600; }
  .cleanup-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .cleanup-row:last-child { border-bottom: 0; }
  .small-copy { color: var(--muted); line-height: 1.45; margin: 0; font-size: 13px; }

  /* ── Responsive ────────────────────────────────────────────── */
  @media (max-width: 1180px) {
    /* Collapse the right rail into the main flow on smaller screens. */
    .shell { grid-template-columns: 232px minmax(0, 1fr); }
    .right-rail { display: none; }
    /* When the rail is hidden, renderLibrary/ renderForm fall back to in-page panels. */
    .in-page-rail { display: block !important; }
  }
  @media (max-width: 760px) {
    body { overflow: auto; }
    #app { height: auto; min-height: 100vh; }
    .topbar { flex-wrap: wrap; height: auto; padding: 10px; gap: 10px; }
    .brand { min-width: 0; }
    .search { order: 3; flex-basis: 100%; max-width: none; }
    .shell { display: block; }
    aside { display: none; }
    main { overflow: visible; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .sample-title { font-size: 22px; }
    .page { padding: 12px; }
    .panel-head { align-items: flex-start; flex-direction: column; }
    .image-stage { min-height: 220px; aspect-ratio: auto; width: 100%; }
    .source-line { align-items: flex-start; }
  }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"><i data-lucide="layers"></i></span>
      <div>clean-ui<small>corpus workbench</small></div>
    </div>
    <div class="search">
      <i data-lucide="search"></i>
      <input id="searchInput" type="search" placeholder="Search by product, pattern, critique, color…">
    </div>
    <div class="top-actions">
      <button class="btn" id="refreshBtn"><i data-lucide="refresh-cw"></i>Refresh</button>
      <button class="btn primary" id="newBtn"><i data-lucide="plus"></i>New sample</button>
    </div>
  </header>

  <div class="shell">
    <aside>
      <!-- Summary strip (Origin-2 technique): equal-width metrics, hairline dividers. -->
      <div class="stat-strip">
        <div class="stat"><b id="statTotal">0</b><span>entries</span></div>
        <div class="stat"><b id="statQuality">0.0</b><span>avg</span></div>
        <div class="stat"><b id="statImages">0</b><span>images</span></div>
      </div>
      <details class="filters" open>
        <summary></summary>
        <div class="filter-body">
        <div>
          <div class="filter-title">Category</div>
          <div class="chip-row" id="categoryFilters"></div>
        </div>
        <div>
          <div class="filter-title">Style</div>
          <div class="chip-row" id="styleFilters"></div>
        </div>
        </div>
      </details>
      <div class="entry-list" id="entryList"></div>
      <div class="list-footer" id="listFooter">0 entries</div>
    </aside>

    <main>
      <div class="workspace">
        <nav class="tabs">
          <button class="tab active" data-view="detail">Library</button>
          <button class="tab" data-view="form">New sample</button>
          <button class="tab" data-view="bulk">Bulk import</button>
          <button class="tab" data-view="stats">Coverage</button>
        </nav>
        <div id="page" class="page"></div>
      </div>
    </main>
    <!-- Right detail rail (Origin "right rail of stacked supporting content"). -->
    <aside class="right-rail">
      <div style="padding: 16px;" id="rightRail"></div>
    </aside>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if (window.location.protocol === "file:") {
  window.location.replace("http://localhost:3131/");
}

const API = "/api";
const today = () => new Date().toISOString().slice(0, 10);
const state = {
  entries: [],
  schema: { categories: [], styleTags: [], patternTypes: [], spacingDensities: [], cornerStyles: [], imageVisibilities: [] },
  selectedId: null,
  view: "detail",
  query: "",
	  filters: { categories: new Set(), styleTags: new Set() },
	  draft: null,
	  draftMode: "create",
	  uploadedImage: null,
	  bulkQueue: [],
	  bulkDefaultProduct: "",
	  bulkEditingIndex: null,
	  orphans: [],
	  config: { openaiKeyConfigured: false, anthropicKeyConfigured: false, geminiKeyConfigured: false, visionKeyConfigured: false, autoTagProvider: "openai", extractionProvider: "openai", critiqueProvider: "openai", extractionModel: "", critiqueModel: "", envFileLoaded: false, openaiAutoTagModel: "gpt-5.4-nano" },
	};

const $ = (selector) => document.querySelector(selector);
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
  "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
})[char]);
const slugify = (value) => value.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").replace(/-{2,}/g, "-") || "sample";
const lines = (value) => String(value || "").split("\n").map((line) => line.trim()).filter(Boolean);

// Derive the active provider display name + model from config (mirrors tagger.resolveProvider).
const providerName = () => {
  const p = state.config.autoTagProvider || "openai";
  const has = { openai: state.config.openaiKeyConfigured, claude: state.config.anthropicKeyConfigured, gemini: state.config.geminiKeyConfigured };
  let active = p;
  if (!has[p]) { for (const k of ["openai","claude","gemini"]) { if (has[k]) { active = k; break; } } }
  return { openai: "OpenAI", claude: "Claude", gemini: "Gemini" }[active] || "OpenAI";
};

async function request(path, options = {}) {
  const response = await fetch(`${API}${path}`, {
    headers: { "content-type": "application/json", ...(options.headers || {}) },
    ...options,
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) {
    const message = data.issues?.join("\n") || data.error || "Request failed";
    throw new Error(message);
  }
  return data;
}

function qualityDots(score) {
  return `<span class="quality">${[1,2,3,4,5].map((n) => `<i class="${n <= score ? "on" : ""}"></i>`).join("")}</span>`;
}

function renderIcons() {
  if (window.lucide) window.lucide.createIcons();
}

async function loadAll({ keepSelection = true } = {}) {
	  const [schema, entries, stats, orphanData, config] = await Promise.all([
	    request("/schema"),
	    request("/entries"),
	    request("/stats"),
	    request("/orphans"),
	    request("/config"),
	  ]);
	  state.schema = schema;
	  state.entries = entries.entries;
	  state.orphans = orphanData.orphans || [];
	  state.config = config;
  if (!keepSelection || !state.entries.some((entry) => entry.id === state.selectedId)) {
    state.selectedId = state.entries[0]?.id ?? null;
  }
  $("#statTotal").textContent = stats.total;
  $("#statQuality").textContent = Number(stats.avgQuality || 0).toFixed(1);
  $("#statImages").textContent = stats.withImages;
  renderFilters();
  renderList();
  renderPage();
}

function filteredEntries() {
  const q = state.query.toLowerCase().trim();
  const terms = q.split(/[^a-z0-9#]+/).filter(Boolean);
  return state.entries.filter((entry) => {
    if (state.filters.categories.size && !entry.categories.some((cat) => state.filters.categories.has(cat))) return false;
    if (state.filters.styleTags.size && !entry.styleTags.some((tag) => state.filters.styleTags.has(tag))) return false;
    if (!q) return true;
    const haystack = [
      entry.id, entry.title, entry.source.productName, entry.source.url, entry.critique,
      ...entry.whatToSteal, ...(entry.antiPatterns?.antiPatterns || []), ...(entry.antiPatterns?.whereThisFails || []), entry.patternType, ...entry.categories, ...entry.styleTags,
      ...entry.visual.dominantColors, entry.visual.accentColor, entry.visual.spacingDensity,
      entry.visual.cornerStyle, entry.visual.typePairing.display, entry.visual.typePairing.body,
      entry.visual.typePairing.notes,
    ].filter(Boolean).join(" ").toLowerCase();
    return terms.every((term) => haystack.includes(term));
  });
}

function renderFilters() {
  $("#categoryFilters").innerHTML = state.schema.categories.map((cat) =>
    `<button class="chip ${state.filters.categories.has(cat) ? "active" : ""}" data-filter="categories" data-value="${cat}">${cat}</button>`
  ).join("");
  $("#styleFilters").innerHTML = state.schema.styleTags.map((tag) =>
    `<button class="chip ${state.filters.styleTags.has(tag) ? "active" : ""}" data-filter="styleTags" data-value="${tag}">${tag}</button>`
  ).join("");
}

function renderList() {
  const entries = filteredEntries();
  $("#listFooter").textContent = `${entries.length} of ${state.entries.length} entries`;
  $("#entryList").innerHTML = entries.length ? entries.map((entry) => `
    <button class="entry-row ${entry.id === state.selectedId ? "active" : ""}" data-entry-id="${entry.id}">
      <span class="entry-top">
        <span class="product">${esc(entry.source.productName)}</span>
        ${qualityDots(entry.qualityScore)}
      </span>
      <span class="entry-title">${esc(entry.title)}</span>
      <span class="entry-meta">
        ${entry.categories.slice(0, 2).map((cat) => `<span class="mini-tag">${cat}</span>`).join("")}
        ${entry.image.path ? `<span class="mini-tag">image</span>` : `<span class="mini-tag">link-only</span>`}
      </span>
    </button>
  `).join("") : `<div class="empty-state"><div><i data-lucide="search-x"></i><p>No matches</p></div></div>`;
  renderIcons();
}

function setView(view) {
  state.view = view;
  document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.view === view));
  if (view === "form" && !state.draft) resetDraft();
  renderPage();
}

function selectedEntry() {
  return state.entries.find((entry) => entry.id === state.selectedId) || null;
}

function renderPage() {
  if (state.view === "form") renderForm();
  else if (state.view === "bulk") renderBulk();
  else if (state.view === "stats") renderStatsPage();
  else renderLibrary();
  // Bulk + Stats don't use the right rail — clear it so stale content doesn't linger.
  if ((state.view === "bulk" || state.view === "stats") && $("#rightRail")) $("#rightRail").innerHTML = "";
  renderIcons();
}

// Render the entry's structured layout field as a mini wireframe — this is the
// dogfood proof: the entry's own layout.regions drawn back as a diagram.
function renderLayoutWireframe(layout) {
  if (!layout?.form) return "";
  const widthFlex = (w) => (w === "fixed-narrow" ? "60px" : w === "fixed-wide" ? "120px" : "1fr");
  const isRow = ["two-column", "three-column"].includes(layout.form);
  const style = isRow
    ? `display:grid;grid-template-columns:${layout.regions.map((r) => widthFlex(r.width)).join(" ")};gap:4px`
    : `display:grid;gap:4px`;
  const blocks = layout.regions.map((r) =>
    `<div class="wire-block" data-role="${r.role}"><span>${r.role}</span></div>`
  ).join("");
  return `
    <div class="rail-card">
      <div class="section-title">Layout · ${layout.form}</div>
      <div class="wireframe" style="${style}">${blocks}</div>
    </div>`;
}

function renderLibrary() {
  const entry = selectedEntry();
  // Right rail: attributes + layout wireframe (or cleared on empty/non-library).
  const rail = $("#rightRail");
  if (!entry) {
    $("#page").innerHTML = `<div class="empty-state"><div><i data-lucide="library"></i><p>No entries yet</p><button class="btn primary" id="emptyNew"><i data-lucide="plus"></i>New sample</button></div></div>`;
    if (rail) rail.innerHTML = "";
    return;
  }

  const image = entry.image.path
    ? `<img src="${API}/image?path=${encodeURIComponent(entry.image.path)}" alt="${esc(entry.title)}"><span class="badge image-badge">${entry.image.visibility}</span>`
    : `<div class="image-empty"><i data-lucide="image-off"></i><span>Link-only sample</span><span class="badge">${entry.image.visibility}</span></div>`;

  // ── Main canvas: the selected entry as a card.
  $("#page").innerHTML = `
    <div class="canvas-card">
      <div class="card-head">
        <div>
          <div class="panel-title">${esc(entry.source.productName)}</div>
          <div class="panel-sub">${esc(entry.id)} · ${entry.patternType}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn" id="editSelected"><i data-lucide="pencil"></i>Edit</button>
          <button class="btn danger" id="deleteSelected"><i data-lucide="trash-2"></i>Delete</button>
        </div>
      </div>
      <div class="card-body detail-hero">
        <h1 class="sample-title">${esc(entry.title)}</h1>
        <div class="source-line">
          ${entry.source.url ? `<a href="${esc(entry.source.url)}" target="_blank" rel="noopener">${esc(entry.source.url)}</a>` : `<span>No source URL</span>`}
          <span>· ${entry.source.capturedAt}</span>
          ${qualityDots(entry.qualityScore)}
        </div>
        <div class="tag-row">
          ${entry.categories.map((cat) => `<span class="tag category">${cat}</span>`).join("")}
          ${entry.styleTags.map((tag) => `<span class="tag style">${tag}</span>`).join("")}
        </div>
        <div class="image-stage">${image}</div>
        <div class="copy-block">
          <section><h2 class="section-title">Critique</h2><p class="critique">${esc(entry.critique)}</p></section>
          <section><h2 class="section-title">What to steal</h2><ul class="steal-list">${entry.whatToSteal.map((item) => `<li>${esc(item)}</li>`).join("")}</ul></section>
          ${(entry.antiPatterns?.antiPatterns || []).length ? `<section><h2 class="section-title">Anti-patterns (mistakes avoided)</h2><ul class="avoid-list">${entry.antiPatterns.antiPatterns.map((item) => `<li>${esc(item)}</li>`).join("")}</ul></section>` : ""}
          ${(entry.antiPatterns?.whereThisFails || []).length ? `<section><h2 class="section-title">Where copying this fails</h2><ul class="avoid-list">${entry.antiPatterns.whereThisFails.map((item) => `<li>${esc(item)}</li>`).join("")}</ul></section>` : ""}
          ${(entry.antiPatterns?.accessibilityRisks || []).length ? `<section><h2 class="section-title">Accessibility risks</h2><ul class="avoid-list">${entry.antiPatterns.accessibilityRisks.map((item) => `<li>${esc(item)}</li>`).join("")}</ul></section>` : ""}
        </div>
      </div>
    </div>
  `;

  // ── Right detail rail: attributes + structured-layout wireframe.
  if (rail) {
    rail.innerHTML = `
      ${renderLayoutWireframe(entry.layout)}
      <div class="rail-card">
        <div class="section-title">Visual attributes</div>
        <div class="attr-grid">
          <div>
            <div class="swatches">
              ${entry.visual.dominantColors.map((c) => `<div class="swatch" style="background:${c}" title="${c}"></div>`).join("")}
              ${entry.visual.accentColor ? `<div class="swatch accent" style="background:${entry.visual.accentColor}" title="accent ${entry.visual.accentColor}"></div>` : ""}
            </div>
          </div>
          <dl>
            <div class="kv"><dt>Spacing</dt><dd>${entry.visual.spacingDensity}</dd></div>
            <div class="kv"><dt>Corners</dt><dd>${entry.visual.cornerStyle}</dd></div>
            <div class="kv"><dt>Shadows</dt><dd>${entry.visual.usesShadows ? "yes" : "no"}</dd></div>
            <div class="kv"><dt>Borders</dt><dd>${entry.visual.usesBorders ? "yes" : "no"}</dd></div>
            <div class="kv"><dt>Display</dt><dd>${entry.visual.typePairing.display || "—"}</dd></div>
            <div class="kv"><dt>Body</dt><dd>${entry.visual.typePairing.body || "—"}</dd></div>
            ${entry.visual.typePairing.notes ? `<div class="kv"><dt>Notes</dt><dd>${esc(entry.visual.typePairing.notes)}</dd></div>` : ""}
          </dl>
        </div>
      </div>
      ${entry.visual.colorRoles ? `
      <div class="rail-card">
        <div class="section-title">Color roles · token set</div>
        <div class="color-tokens">
          ${[
            ["canvas", entry.visual.colorRoles.canvas],
            ["surface", entry.visual.colorRoles.surface],
            ["ink", entry.visual.colorRoles.ink],
            entry.visual.colorRoles.muted ? ["muted", entry.visual.colorRoles.muted] : null,
            ["accent", entry.visual.colorRoles.accent],
          ].filter(Boolean).map(([role, hex]) =>
            `<div class="color-token"><span class="color-chip" style="background:${hex}"></span><span class="color-role">${role}</span><span class="color-hex">${hex}</span></div>`
          ).join("")}
        </div>
      </div>` : ""}
      ${entry.voice ? `
      <div class="rail-card">
        <div class="section-title">Voice</div>
        <div class="voice-tone">${esc(entry.voice.tone)}</div>
        <ul class="voice-examples">${entry.voice.examples.map((ex) => `<li>${esc(ex)}</li>`).join("")}</ul>
        ${entry.voice.avoid.length ? `<div class="voice-avoid">Avoids: ${entry.voice.avoid.map(esc).join("; ")}</div>` : ""}
      </div>` : ""}
    `;
  }
}

function blankDraft() {
  return {
    id: "",
    title: "",
    patternType: "dashboard",
    categories: [],
    styleTags: [],
    source: { productName: "", url: null, capturedAt: today(), capturedBy: "self" },
    image: { visibility: "private", path: null, width: null, height: null },
    visual: {
      dominantColors: ["#ffffff", "#111111"],
      accentColor: null,
      typePairing: { display: null, body: null, notes: "" },
      spacingDensity: "moderate",
      cornerStyle: "slight-round",
      usesShadows: false,
      usesBorders: true,
    },
    critique: "",
    whatToSteal: [""],
    antiPatterns: { antiPatterns: [], whereThisFails: [], accessibilityRisks: [] },
    qualityTier: "exceptional",
    qualityScore: 4,
    addedAt: today(),
  };
}

function resetDraft(entry = null) {
  state.draft = entry ? JSON.parse(JSON.stringify(entry)) : blankDraft();
  state.draftMode = entry ? "edit" : "create";
  state.uploadedImage = null;
  state.bulkEditingIndex = null;
}

function syncDraftFromForm() {
  if (!state.draft || !$("#entryForm")) return;
  const form = $("#entryForm");
  const isEditing = state.draftMode === "edit";
  const productName = form.productName.value.trim();
  const title = form.title.value.trim();
  const proposedId = slugify(`${productName}-${title || "sample"}`).slice(0, 80);
  state.draft.id = isEditing && form.id ? form.id.value.trim() || proposedId : "";
  state.draft.title = title;
  state.draft.source.productName = productName;
  state.draft.source.url = form.url.value.trim() || null;
  state.draft.source.capturedAt = form.capturedAt.value;
  state.draft.source.capturedBy = form.capturedBy.value;
  state.draft.categories = [...new Set([
    form.primaryCategory.value,
    ...[...form.querySelectorAll("input[name='categories']:checked")].map((input) => input.value),
  ].filter(Boolean))];
  state.draft.styleTags = [...new Set([
    form.primaryStyleTag.value,
    ...[...form.querySelectorAll("input[name='styleTags']:checked")].map((input) => input.value),
  ].filter(Boolean))];
  state.draft.patternType = form.patternType.value;
  state.draft.image.visibility = form.visibility.value;
  state.draft.image.path = form.imagePath.value.trim() || null;
  state.draft.image.width = form.imageWidth.value ? Number(form.imageWidth.value) : null;
  state.draft.image.height = form.imageHeight.value ? Number(form.imageHeight.value) : null;
  state.draft.visual.dominantColors = lines(form.dominantColors.value);
  state.draft.visual.accentColor = form.accentColor.value.trim() || null;
  state.draft.visual.typePairing.display = form.displayFont.value.trim() || null;
  state.draft.visual.typePairing.body = form.bodyFont.value.trim() || null;
  state.draft.visual.typePairing.notes = form.typeNotes.value.trim() || undefined;
  state.draft.visual.spacingDensity = form.spacingDensity.value;
  state.draft.visual.cornerStyle = form.cornerStyle.value;
  state.draft.visual.usesShadows = form.usesShadows.checked;
  state.draft.visual.usesBorders = form.usesBorders.checked;
  state.draft.critique = form.critique.value.trim();
  state.draft.whatToSteal = lines(form.whatToSteal.value);
  state.draft.antiPatterns = {
    antiPatterns: lines(form.antiPatterns.value),
    whereThisFails: lines(form.whereThisFails.value),
    accessibilityRisks: lines(form.accessibilityRisks.value),
  };
  // Voice + qualityTier + colorRoles — all optional/advanced.
  if (form.voiceTone && form.voiceTone.value.trim()) {
    state.draft.voice = {
      tone: form.voiceTone.value.trim(),
      examples: lines(form.voiceExamples.value),
      avoid: lines(form.voiceAvoid.value),
    };
  } else {
    state.draft.voice = undefined;
  }
  if (form.colorRolesCanvas && form.colorRolesCanvas.value.trim()) {
    state.draft.visual.colorRoles = {
      canvas: form.colorRolesCanvas.value.trim(),
      surface: form.colorRolesSurface.value.trim(),
      ink: form.colorRolesInk.value.trim(),
      muted: form.colorRolesMuted.value.trim() || null,
      accent: form.colorRolesAccent.value.trim(),
    };
  } else {
    state.draft.visual.colorRoles = undefined;
  }
  state.draft.qualityTier = form.qualityTier ? form.qualityTier.value : "exceptional";
  state.draft.qualityScore = Number(form.qualityScore.value);
  state.draft.addedAt = form.addedAt.value;
}

function validateDraft() {
  const entry = state.draft;
  const issues = [];
  if (state.draftMode === "edit" && !/^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(entry.id)) issues.push("Use a stable kebab-case id.");
  if (state.draftMode === "edit" && state.entries.some((candidate) => candidate.id === entry.id && candidate.id !== state.selectedId)) issues.push("That id already exists.");
  if (!entry.title) issues.push("Add a title.");
  if (!entry.source.productName) issues.push("Add a product name.");
  if (entry.source.url && !/^https?:\/\/.+/.test(entry.source.url)) issues.push("Use a valid source URL or leave it blank.");
  if (!entry.categories.length) issues.push("Choose at least one category.");
  if (!entry.styleTags.length) issues.push("Choose at least one style tag.");
  if (!entry.visual.dominantColors.length || !entry.visual.dominantColors.every((color) => /^#[0-9a-fA-F]{6}$/.test(color))) issues.push("Dominant colors must be #RRGGBB values.");
  if (entry.visual.accentColor && !/^#[0-9a-fA-F]{6}$/.test(entry.visual.accentColor)) issues.push("Accent color must be #RRGGBB or blank.");
  if (entry.critique.length < 80) issues.push("Critique must be at least 80 characters.");
  if (!entry.whatToSteal.length || entry.whatToSteal.some((item) => item.length < 10)) issues.push("Add at least one concrete technique.");
  if (!entry.antiPatterns || !entry.antiPatterns.antiPatterns || !entry.antiPatterns.antiPatterns.length || entry.antiPatterns.antiPatterns.some((a) => a.length < 10)) issues.push("Add at least one anti-pattern (what mistake does this design avoid?).");
  if (!entry.image.path) issues.push("Capture or upload a screenshot before saving.");
  if (entry.image.visibility !== "private" && (!entry.image.path || !entry.image.width || !entry.image.height)) issues.push("Public images need path, width, and height.");
  if (entry.image.path && !/^(images-private|images-public)\/[^/].+/.test(entry.image.path)) issues.push("Image path must be corpus-relative.");
  // Draft-hygiene gate (mirrors the centralized findDraftMarkers in schema.ts):
  // block save if any text field still carries a [DRAFT]/[PLACEHOLDER]/[TODO] marker.
  const draftTexts = [
    entry.critique, ...entry.whatToSteal,
    ...(entry.antiPatterns?.antiPatterns || []), ...(entry.antiPatterns?.whereThisFails || []), ...(entry.antiPatterns?.accessibilityRisks || []),
    ...(entry.voice ? [entry.voice.tone, ...entry.voice.examples, ...entry.voice.avoid] : []),
  ];
  if (draftTexts.some((t) => /\[(?:DRAFT|PLACEHOLDER|TODO\b)/i.test(t))) issues.push("Remove all [DRAFT] / [PLACEHOLDER] / [TODO] markers before saving — rewrite those fields in your own words.");
  return issues;
}

function updatePreview() {

  $("#jsonPreview").textContent = JSON.stringify(state.draft, null, 2);
  $("#saveForm").disabled = issues.length > 0;
  const autoFill = $("#autoFill");
  if (autoFill) autoFill.disabled = !state.config.visionKeyConfigured || !state.draft.source.productName || !state.draft.image.path;
  renderIcons();
}

async function saveDraft() {
  syncDraftFromForm();
  const issues = validateDraft();
  if (issues.length) {
    toast(issues[0], "error");
    updatePreview();
    return;
  }
  // Editing a bulk-queue item: write back to the queue, not the corpus.
  if (state.bulkEditingIndex !== null && state.bulkEditingIndex >= 0 && state.bulkQueue[state.bulkEditingIndex]) {
    const idx = state.bulkEditingIndex;
    const prev = state.bulkQueue[idx];
    state.bulkQueue[idx] = { ...JSON.parse(JSON.stringify(state.draft)), _status: prev._status, _error: null, _filename: prev._filename };
    state.bulkEditingIndex = null;
    state.draft = null;
    setView("bulk");
    toast("Updated queue item", "success");
    return;
  }
  const isEditing = state.draftMode === "edit";
  try {
    const data = await request(isEditing ? `/entries/${encodeURIComponent(state.draft.id)}` : "/entries", {
      method: isEditing ? "PUT" : "POST",
      body: JSON.stringify(state.draft),
    });
    state.selectedId = data.entry.id;
    state.draft = null;
    await loadAll({ keepSelection: true });
    setView("detail");
    toast("Saved", "success");
  } catch (error) {
    toast(error.message, "error");
  }
}

async function uploadImage(file) {
  if (!file) return;
  syncDraftFromForm();
  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  try {
	    const uploaded = await request("/upload-image", {
	      method: "POST",
	      body: JSON.stringify({ filename: file.name, slug: state.draft.title || state.draft.source.productName || file.name, dataUrl }),
	    });
    state.draft.image = {
      visibility: uploaded.visibility,
      path: uploaded.path,
      width: uploaded.width,
      height: uploaded.height,
    };
    renderForm();
	    toast("Image uploaded", "success");
  } catch (error) {
    toast(error.message, "error");
  }
}

function cleanTaggedDraft(entry, previous) {
  const cleaned = JSON.parse(JSON.stringify(entry));
  const stripDraft = (s) => s.replace(/^\[DRAFT[^\]]*\]\s*/i, "");
  cleaned.title = cleaned.title.replace(" — (add descriptive subtitle)", "");
  cleaned.critique = stripDraft(cleaned.critique);
  cleaned.whatToSteal = cleaned.whatToSteal.map(stripDraft);
  // Also strip [DRAFT] markers from anti-patterns + voice — the tagger adds
  // them there too, and the centralized hygiene check blocks saves if they linger.
  if (cleaned.antiPatterns) {
    cleaned.antiPatterns.antiPatterns = (cleaned.antiPatterns.antiPatterns || []).map(stripDraft);
    cleaned.antiPatterns.whereThisFails = (cleaned.antiPatterns.whereThisFails || []).map(stripDraft);
    cleaned.antiPatterns.accessibilityRisks = (cleaned.antiPatterns.accessibilityRisks || []).map(stripDraft);
  }
  if (cleaned.voice) {
    cleaned.voice.tone = stripDraft(cleaned.voice.tone);
    cleaned.voice.examples = (cleaned.voice.examples || []).map(stripDraft);
    cleaned.voice.avoid = (cleaned.voice.avoid || []).map(stripDraft);
  }
  // The server owns id assignment for both new single samples and bulk items.
  // Keep an existing id only when explicitly editing a saved entry (draftMode
  // === "edit" and NOT a bulk-queue edit, which uses bulkEditingIndex).
  const editingSaved = state.draftMode === "edit" && state.bulkEditingIndex === null;
  if (!editingSaved) cleaned.id = "";
  cleaned.image = previous.image;
  // Preserve the user's qualityScore and qualityTier — don't let auto-fill
  // overwrite them. Cautionary entries should stay low-scored.
  cleaned.qualityScore = previous.qualityScore || cleaned.qualityScore || 4;
  if (previous.qualityTier) cleaned.qualityTier = previous.qualityTier;
  cleaned.addedAt = previous.addedAt || today();
  return cleaned;
}

// ── Bulk import ────────────────────────────────────────────────────────────
// Mirrors the terminal bulk-import.ts flow: upload → stage blank drafts →
// Auto-fill all (OpenAI vision) → review → commit. The server endpoints are
// unchanged; the browser orchestrates them with a small bounded-concurrency
// pool so we don't fire N simultaneous uploads.

const KNOWN_PRODUCTS = {
  linear:      { name: "Linear",      url: "https://linear.app" },
  stripe:      { name: "Stripe",      url: "https://stripe.com" },
  vercel:      { name: "Vercel",      url: "https://vercel.com" },
  arc:         { name: "Arc",         url: "https://arc.net" },
  notion:      { name: "Notion",      url: "https://notion.so" },
  figma:       { name: "Figma",       url: "https://figma.com" },
  github:      { name: "GitHub",      url: "https://github.com" },
  raycast:     { name: "Raycast",     url: "https://raycast.com" },
  craft:       { name: "Craft",       url: "https://craft.do" },
  loom:        { name: "Loom",        url: "https://loom.com" },
  retool:      { name: "Retool",      url: "https://retool.com" },
  planetscale: { name: "PlanetScale", url: "https://planetscale.com" },
  supabase:    { name: "Supabase",    url: "https://supabase.com" },
  resend:      { name: "Resend",      url: "https://resend.com" },
  clerk:       { name: "Clerk",       url: "https://clerk.com" },
};

function inferProduct(filename) {
  const stem = filename.replace(/\.[^.]+$/, "");
  const slug = stem.split("__")[0].toLowerCase().replace(/[^a-z0-9]/g, "-");
  return KNOWN_PRODUCTS[slug] ?? null;
}

async function runWithPool(tasks, limit, onResult, onError) {
  const queue = [...tasks.entries()];
  let active = 0;
  await new Promise((resolve) => {
    const next = () => {
      while (active < limit && queue.length > 0) {
        const [i, task] = queue.shift();
        active += 1;
        task()
          .then((r) => onResult(r, i))
          .catch((e) => onError(e, i))
          .finally(() => { active -= 1; next(); if (active === 0 && queue.length === 0) resolve(); });
      }
    };
    if (tasks.length === 0) resolve();
    next();
  });
}

function bulkTally() {
  const q = state.bulkQueue;
  return {
    total: q.length,
    staged: q.filter((i) => i._status === "staged").length,
    tagging: q.filter((i) => i._status === "tagging").length,
    tagged: q.filter((i) => i._status === "tagged").length,
    error: q.filter((i) => i._status === "error").length,
    committed: q.filter((i) => i._status === "committed").length,
  };
}

function renderBulk() {
  const t = bulkTally();
  const keyReady = state.config.visionKeyConfigured;
  const keyStatus = keyReady
    ? `<div class="key-status ready">Auto-fill: ${esc(state.config.extractionProvider || "openai")} (${esc(state.config.extractionModel || "?")}) → ${esc(state.config.critiqueProvider || "openai")} (${esc(state.config.critiqueModel || "?")}).</div>`
    : `<div class="key-status missing">Auto-fill needs a vision provider key in .env. Staging still works; tag later.</div>`;
  const autoFillBtn = `<button class="btn" id="bulkAutoFill" ${(!t.staged || !keyReady) ? "disabled" : ""}><i data-lucide="wand-sparkles"></i>Auto-fill all (${t.staged})</button>`;
  const commitBtn = `<button class="btn primary" id="bulkCommit" ${(t.tagged === 0) ? "disabled" : ""}><i data-lucide="save"></i>Commit ready (${t.tagged})</button>`;
  const clearBtn = `<button class="btn" id="bulkClear" ${(state.bulkQueue.length === 0) ? "disabled" : ""}><i data-lucide="trash-2"></i>Clear queue</button>`;

  const queue = state.bulkQueue.length
    ? `<div class="bulk-queue">${state.bulkQueue.map(renderBulkRow).join("")}</div>`
    : `<div class="bulk-empty"><div><i data-lucide="images"></i><p>No files staged yet. Add screenshots to begin.</p></div></div>`;

  $("#page").innerHTML = `
    <div class="form-layout">
      <section class="panel">
        <div class="panel-head">
          <div><div class="panel-title">Bulk import</div><div class="panel-sub">Stage → Auto-fill → Commit</div></div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${autoFillBtn}${commitBtn}${clearBtn}
          </div>
        </div>
        <div class="panel-body">
          <div class="starter">
            <strong>How this works</strong>
            <p>Add several screenshots at once. Each becomes a private draft. Click <em>Auto-fill all</em> to draft critique and visual attributes with vision AI, review, then <em>Commit ready</em> to add approved drafts to the corpus.</p>
          </div>
          ${keyStatus}
          <div class="bulk-bar" style="margin-top:14px">
            <label class="btn source-action bulk-add">
              <input type="file" id="bulkFileInput" accept="image/png,image/jpeg,image/webp" multiple hidden>
              <i data-lucide="upload"></i><span>Add files</span>
            </label>
            <label class="source-action" id="bulkDropzone" style="position:relative">
              <i data-lucide="folder-input"></i><span>Or drop files here</span>
            </label>
            <input class="product-input bulk-default-product" id="bulkDefaultProduct" placeholder="Default product name (used when filename can't infer one)" value="${esc(state.bulkDefaultProduct)}">
          </div>
          ${queue}
        </div>
      </section>

      <aside class="panel">
        <div class="panel-head"><div><div class="panel-title">Queue check</div><div class="panel-sub">Live tally</div></div></div>
        <div class="panel-body">
          <div class="queue-tally">
            <div class="t">Staged <b>${t.staged}</b></div>
            <div class="t">Tagging <b>${t.tagging}</b></div>
            <div class="t">Tagged <b>${t.tagged}</b></div>
            <div class="t">Errors <b>${t.error}</b></div>
          </div>
          <div class="starter" style="margin-top:14px">
            <strong>Notes</strong>
            <p>Auto-fill writes <code>[DRAFT]</code> critique and steal text — rewrite those before or after committing; the validator blocks any entry still carrying a marker. Commit assigns ids server-side and refreshes the library.</p>
          </div>
          ${t.error ? `<div class="legacy-note" style="margin-top:12px">${t.error} item(s) failed. Open the row to see the error, or remove it and re-add.</div>` : ""}
        </div>
      </aside>
    </div>
  `;
}

function renderBulkRow(item, index) {
  const thumb = item.image.path
    ? `<img class="thumb" src="${API}/image?path=${encodeURIComponent(item.image.path)}" alt="">`
    : `<div class="thumb empty"><i data-lucide="image-off"></i></div>`;
  const filename = item._filename || "(unknown)";
  const statusLabel = {
    staged: "Staged", tagging: "Tagging…", tagged: "Tagged", error: "Error", committing: "Saving…", committed: "Committed",
  }[item._status] || item._status;
  const editable = item._status === "staged" || item._status === "tagged";
  const productInput = editable
    ? `<input class="product-input" data-bulk-product="${index}" value="${esc(item.source.productName)}" placeholder="Product name">`
    : `<div class="filename">${esc(item.source.productName || "—")}</div>`;
  const errLine = item._error ? `<div class="err">${esc(item._error)}</div>` : "";
  return `
    <div class="bulk-row ${item._status}" data-bulk-index="${index}">
      ${thumb}
      <div class="meta">
        <div class="filename">${esc(filename)}</div>
        ${productInput}
        ${errLine}
      </div>
      <div class="actions">
        <span class="status-chip ${item._status}">${statusLabel}</span>
        <button class="btn remove" data-bulk-remove="${index}" title="Remove"><i data-lucide="x"></i></button>
      </div>
    </div>`;
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function enqueueFiles(fileList) {
  const files = [...fileList].filter((f) => /^image\/(png|jpe?g|webp)$/.test(f.type));
  const rejected = fileList.length - files.length;
  if (files.length === 0) {
    toast(rejected ? "No supported files (PNG, JPEG, WebP only)" : "No files selected", "error");
    return;
  }

  const tasks = files.map((file) => async () => {
    const dataUrl = await readFileAsDataUrl(file);
    const slug = slugify(file.name.replace(/\.[^.]+$/, ""));
    const uploaded = await request("/upload-image", {
      method: "POST",
      body: JSON.stringify({ filename: file.name, slug, dataUrl }),
    });
    // Dedup check: compare hash + dimensions against existing corpus entries.
    const dupCheck = await request("/check-duplicate", {
      method: "POST",
      body: JSON.stringify({ hash: uploaded.hash, width: uploaded.width, height: uploaded.height, path: uploaded.path }),
    });
    if (dupCheck.duplicate) {
      throw new Error(`Duplicate (${dupCheck.type}) of "${dupCheck.match}" — skipped`);
    }
    const draft = blankDraft();
    const inferred = inferProduct(file.name);
    draft.source.productName = inferred?.name ?? state.bulkDefaultProduct ?? "";
    if (inferred?.url) draft.source.url = inferred.url;
    draft.image = { visibility: uploaded.visibility, path: uploaded.path, width: uploaded.width, height: uploaded.height };
    draft.title = draft.source.productName ? `${draft.source.productName} — (add descriptive subtitle)` : "";
    return { draft, filename: file.name };
  });

  let added = 0;
  await runWithPool(
    tasks,
    3,
    ({ draft, filename }) => {
      state.bulkQueue.push({ ...draft, _status: "staged", _error: null, _filename: filename });
      added += 1;
      renderBulk();
    },
    (err, i) => {
      const filename = files[i]?.name ?? "(unknown)";
      state.bulkQueue.push({ ...blankDraft(), _status: "error", _error: err.message || "Upload failed", _filename: filename, image: { visibility: "private", path: null, width: null, height: null } });
      renderBulk();
    },
  );

  toast(`Staged ${added} of ${files.length} file(s)${rejected ? `; ${rejected} unsupported` : ""}`, added ? "success" : "error");
}

async function autoFillQueue() {
  if (!state.config.visionKeyConfigured) { toast("Add a vision provider key to .env, then restart npm run ui.", "error"); return; }
  const staged = state.bulkQueue
    .map((item, index) => ({ item, index }))
    .filter((x) => x.item._status === "staged");
  if (staged.length === 0) { toast("Nothing staged to auto-fill", "error"); return; }

  // Snapshot the batch default in case the user edits the field mid-run.
  const batchDefault = state.bulkDefaultProduct.trim();

  const tasks = staged.map(({ item, index }) => async () => {
    const productName = (item.source.productName || "").trim() || batchDefault;
    if (!productName) throw new Error("No product name (set one per row or a batch default)");
    state.bulkQueue[index]._status = "tagging";
    state.bulkQueue[index]._error = null;
    renderBulk();
    const data = await request("/auto-tag", {
      method: "POST",
      body: JSON.stringify({ imagePath: item.image.path, productName, url: item.source.url || null }),
    });
    // Merge the tagged fields onto the staged draft, preserving its image.
    const cleaned = cleanTaggedDraft(data.entry, item);
    cleaned._filename = item._filename;
    state.bulkQueue[index] = { ...cleaned, _status: "tagged", _error: null, _filename: item._filename };
    renderBulk();
  });

  let ok = 0;
  await runWithPool(
    tasks,
    3,
    () => { ok += 1; },
    (err, i) => {
      const { index } = staged[i];
      state.bulkQueue[index]._status = "error";
      state.bulkQueue[index]._error = err.message || "Auto-fill failed";
      renderBulk();
    },
  );

  const t = bulkTally();
  toast(`Tagged ${ok}; ${t.tagged} ready to commit, ${t.error} error(s)`, ok ? "success" : "error");
}

async function commitQueue() {
  const ready = state.bulkQueue
    .map((item, index) => ({ item, index }))
    .filter((x) => x.item._status === "tagged");
  if (ready.length === 0) { toast("Nothing ready to commit (auto-fill first)", "error"); return; }

  let committed = 0;
  const tasks = ready.map(({ item, index }) => async () => {
    state.bulkQueue[index]._status = "committing";
    renderBulk();
    // Server assigns a unique id; strip any client-side id first.
    const payload = JSON.parse(JSON.stringify(item));
    payload.id = "";
    const data = await request("/entries", { method: "POST", body: JSON.stringify(payload) });
    state.bulkQueue[index]._status = "committed";
    committed += 1;
    renderBulk();
  });

  await runWithPool(
    tasks,
    3,
    () => {},
    (err, i) => {
      const { index } = ready[i];
      state.bulkQueue[index]._status = "error";
      state.bulkQueue[index]._error = err.message || "Commit failed (validation)";
      renderBulk();
    },
  );

  // Drop committed rows, keep errors for review.
  state.bulkQueue = state.bulkQueue.filter((i) => i._status !== "committed");
  await loadAll();
  renderBulk();
  toast(`Committed ${committed} to corpus`, committed ? "success" : "error");
}

function bulkRemoveAt(index) {
  state.bulkQueue.splice(index, 1);
  renderBulk();
}

function bulkEditAt(index) {
  // Open a tagged/staged draft in the full editor; on save it returns here.
  const item = state.bulkQueue[index];
  if (!item) return;
  resetDraft(JSON.parse(JSON.stringify(item)));
  state.draftMode = "create"; // server owns id assignment on commit
  state.bulkEditingIndex = index; // set AFTER resetDraft (which clears it)
  setView("form");
}

async function autoFillDraft() {
  syncDraftFromForm();
  if (!state.config.visionKeyConfigured) {
    toast("Add a vision provider key to .env, then restart npm run ui.", "error");
    return;
  }
  if (!state.draft.source.productName) {
    toast("Add product name first", "error");
    return;
  }
  if (!state.draft.image.path) {
    toast("Upload a screenshot or pull one from Source URL first", "error");
    return;
  }

  const button = $("#autoFill");
  const original = button.innerHTML;
  button.disabled = true;
  button.innerHTML = `<i data-lucide="loader-circle"></i>Analyzing`;
  renderIcons();

  try {
    const data = await request("/auto-tag", {
      method: "POST",
      body: JSON.stringify({
        imagePath: state.draft.image.path,
        productName: state.draft.source.productName,
        url: state.draft.source.url || null,
	        id: state.draftMode === "edit" ? state.draft.id : undefined,
      }),
    });
    state.draft = cleanTaggedDraft(data.entry, state.draft);
    renderForm();
    toast("Auto-filled from image", "success");
  } catch (error) {
    toast(error.message, "error");
  } finally {
    const nextButton = $("#autoFill");
    if (nextButton) {
      nextButton.disabled = false;
      nextButton.innerHTML = original;
      renderIcons();
    }
  }
}

function renderStatsPage() {
  const byCategory = {};
  const byStyle = {};
  const imageCount = state.entries.filter((entry) => !!entry.image.path).length;
  const legacyCount = state.entries.filter((entry) => !entry.image.path).length;
  for (const entry of state.entries) {
    entry.categories.forEach((cat) => byCategory[cat] = (byCategory[cat] || 0) + 1);
    entry.styleTags.forEach((tag) => byStyle[tag] = (byStyle[tag] || 0) + 1);
  }
  const rows = (object) => Object.entries(object).sort((a, b) => b[1] - a[1]).map(([name, count]) =>
    `<div class="kv"><dt>${esc(name)}</dt><dd>${count}</dd></div>`
  ).join("");
	  $("#page").innerHTML = `
	    <div class="detail-layout">
	      <section class="panel">
	        <div class="panel-head"><div><div class="panel-title">Category coverage</div><div class="panel-sub">${Object.keys(byCategory).length} represented</div></div></div>
	        <div class="panel-body"><dl>${rows(byCategory) || `<div class="panel-sub">No data</div>`}</dl></div>
	      </section>
	      <aside class="panel">
	        <div class="panel-head"><div><div class="panel-title">Corpus health</div><div class="panel-sub">${imageCount} image samples, ${legacyCount} legacy link-only</div></div></div>
	        <div class="panel-body attr-grid">
	          <div>
	            <div class="section-title">Style coverage</div>
	            <dl>${rows(byStyle) || `<div class="panel-sub">No data</div>`}</dl>
	          </div>
	          <div>
	            <div class="section-title">Unused private images</div>
	            <div class="cleanup-row">
	              <p class="small-copy">${state.orphans.length ? `${state.orphans.length} uploaded or captured file${state.orphans.length === 1 ? "" : "s"} are not referenced by any entry.` : "No orphaned private screenshots found."}</p>
	              <button class="btn danger" id="cleanupOrphans" ${state.orphans.length ? "" : "disabled"}><i data-lucide="trash-2"></i>Clean up</button>
	            </div>
	            ${state.orphans.length ? `<div class="panel-sub">${state.orphans.slice(0, 6).map(esc).join("<br>")}${state.orphans.length > 6 ? "<br>..." : ""}</div>` : ""}
	          </div>
	        </div>
	      </aside>
	    </div>
	  `;
}

async function cleanupOrphans() {
  if (!state.orphans.length) return;
  if (!confirm(`Delete ${state.orphans.length} unused private screenshot file${state.orphans.length === 1 ? "" : "s"}?`)) return;
  try {
    const result = await request("/orphans", { method: "DELETE" });
    await loadAll({ keepSelection: true });
    setView("stats");
    toast(`Deleted ${result.count} unused file${result.count === 1 ? "" : "s"}`, "success");
  } catch (error) {
    toast(error.message, "error");
  }
}

async function deleteSelected() {
  const entry = selectedEntry();
  if (!entry || !confirm(`Delete ${entry.title}?`)) return;
  try {
    await request(`/entries/${encodeURIComponent(entry.id)}`, { method: "DELETE" });
    state.selectedId = null;
    await loadAll({ keepSelection: false });
    toast("Deleted", "success");
  } catch (error) {
    toast(error.message, "error");
  }
}

function toast(message, type = "") {
  const el = $("#toast");
  el.textContent = message;
  el.className = `toast show ${type}`;
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
}

document.addEventListener("click", (event) => {
  const entryButton = event.target.closest("[data-entry-id]");
  if (entryButton) {
    state.selectedId = entryButton.dataset.entryId;
    state.view = "detail";
    document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.view === "detail"));
    renderList();
    renderPage();
    return;
  }
  const tab = event.target.closest(".tab");
  if (tab) setView(tab.dataset.view);
  const chip = event.target.closest("[data-filter]");
  if (chip) {
    const set = state.filters[chip.dataset.filter];
    set.has(chip.dataset.value) ? set.delete(chip.dataset.value) : set.add(chip.dataset.value);
    renderFilters();
    renderList();
  }
  if (event.target.closest("#newBtn") || event.target.closest("#emptyNew")) {
    resetDraft();
    setView("form");
  }
  if (event.target.closest("#refreshBtn")) loadAll().then(() => toast("Refreshed", "success")).catch((error) => toast(error.message, "error"));
  if (event.target.closest("#editSelected")) {
    const entry = selectedEntry();
    if (entry) {
      resetDraft(entry);
      setView("form");
    }
  }
	  if (event.target.closest("#deleteSelected")) deleteSelected();
	  if (event.target.closest("#cleanupOrphans")) cleanupOrphans();
  if (event.target.closest("#resetForm")) {
    resetDraft();
    renderForm();
  }
  if (event.target.closest("#captureSource")) captureSourceImage();
  if (event.target.closest("#autoFill")) autoFillDraft();
  if (event.target.closest("#saveForm")) saveDraft();
  // ── bulk import wiring ──
  if (event.target.closest("#bulkAutoFill")) autoFillQueue();
  if (event.target.closest("#bulkCommit")) commitQueue();
  if (event.target.closest("#bulkClear")) { state.bulkQueue = []; renderBulk(); }
  const bulkRemove = event.target.closest("[data-bulk-remove]");
  if (bulkRemove) bulkRemoveAt(Number(bulkRemove.dataset.bulkRemove));
  const bulkRow = event.target.closest("[data-bulk-index]");
  if (bulkRow && !event.target.closest("input") && !event.target.closest("button")) {
    bulkEditAt(Number(bulkRow.dataset.bulkIndex));
  }
});

document.addEventListener("input", (event) => {
  if (event.target.id === "searchInput") {
    state.query = event.target.value;
    renderList();
    return;
  }
  if (event.target.id === "bulkDefaultProduct") {
    state.bulkDefaultProduct = event.target.value;
    return;
  }
  const productField = event.target.closest("[data-bulk-product]");
  if (productField) {
    const idx = Number(productField.dataset.bulkProduct);
    if (state.bulkQueue[idx]) state.bulkQueue[idx].source.productName = productField.value;
    return;
  }
  if (event.target.closest("#entryForm")) updatePreview();
});

document.addEventListener("change", (event) => {
  if (event.target.id === "imageFile") uploadImage(event.target.files[0]);
  if (event.target.id === "bulkFileInput" && event.target.files.length) {
    enqueueFiles(event.target.files);
    event.target.value = ""; // allow re-adding the same file later
  }
  if (event.target.closest("#entryForm")) updatePreview();
});

document.addEventListener("dragover", (event) => {
  const zone = event.target.closest("#dropzone, #bulkDropzone");
  if (!zone) return;
  event.preventDefault();
  zone.classList.add("drag");
});
document.addEventListener("dragleave", (event) => {
  const zone = event.target.closest("#dropzone, #bulkDropzone");
  if (zone) zone.classList.remove("drag");
});
document.addEventListener("drop", (event) => {
  const bulkZone = event.target.closest("#bulkDropzone");
  if (bulkZone) {
    event.preventDefault();
    bulkZone.classList.remove("drag");
    if (event.dataTransfer.files.length) enqueueFiles(event.dataTransfer.files);
    return;
  }
  const zone = event.target.closest("#dropzone");
  if (!zone) return;
  event.preventDefault();
  zone.classList.remove("drag");
  uploadImage(event.dataTransfer.files[0]);
});

document.addEventListener("keydown", (event) => {
  if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s" && state.view === "form") {
    event.preventDefault();
    saveDraft();
  }
});

loadAll({ keepSelection: false }).catch((error) => {
  $("#page").innerHTML = `<div class="empty-state"><div><i data-lucide="circle-alert"></i><p>${esc(error.message)}</p></div></div>`;
  renderIcons();
});
</script>
</body>
</html>
